        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        :root {
            --gold: #a68966;
            --dark: #2d241d;
            --cream: #fdfbf7;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--cream); 
            color: var(--dark); 
            margin: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .nav-glass { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(10px); 
            z-index: 1000; 
            border-bottom: 1px solid #f0f0f0;
        }

        /* --- SOSIAL MEDIA ICONS --- */
        .social-link {
            color: var(--dark);
            transition: all 0.3s ease;
            opacity: 0.7;
        }
        .social-link:hover {
            color: var(--gold);
            opacity: 1;
            transform: translateY(-2px);
        }

        .profile-socials {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 12px;
            margin-bottom: 12px;
            transition: all 0.4s ease;
        }
        .is-transformed .profile-socials {
            justify-content: flex-start;
            margin-top: 8px;
            margin-bottom: 0px;
        }

        /* --- PROFILE DRAG & TRANSFORM LOGIC --- */
        #profile-trigger {
            touch-action: pan-y;
            cursor: grab;
            position: relative;
            z-index: 10;
        }
        #profile-trigger:active { cursor: grabbing; }

        .profile-container {
            /* Menggunakan cubic-bezier agar animasi lebih responsif dan bouncy */
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding-top: 100px;
            padding-bottom: 30px;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .profile-image-wrapper {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .profile-text-content {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* State Transformasi (Ditarik atau Scrolled) */
        .is-transformed .profile-container {
            flex-direction: row;
            align-items: center;
            text-align: left;
            padding-left: 20px;
            padding-right: 20px;
            padding-top: 90px;
            padding-bottom: 20px;
        }

        .is-transformed .profile-image-wrapper {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            margin-bottom: 0;
            margin-right: 20px;
        }

        /* --- BLEND MODE UNTUK HILANGKAN LATAR PUTIH --- */
        .blend-multiply {
            mix-blend-mode: multiply;
        }

        /* --- UI ELEMENTS --- */
        .section-header-text {
            font-size: 14px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 0.3em; color: var(--dark); margin-bottom: 15px; text-align: center;
        }

        .unit-card {
            background: white; border-radius: 2rem; overflow: hidden;
            border: 1px solid #f0ebe3; box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            margin-bottom: 2.5rem;
            position: relative;
            z-index: 1;
        }

        /* Ubah warna latar hero menjadi sedikit abu terang agar blend-mode multiply terlihat optimal */
        .hero-view {
            width: 100%; aspect-ratio: 16/10; background: #f5f5f5;
            overflow: hidden; position: relative; display: flex;
            align-items: center; justify-content: center;
            transition: background 0.3s ease;
        }

        .hero-view img { width: 100%; height: 100%; object-fit: cover; transition: mix-blend-mode 0.3s ease; }
        
        /* Saat preview gambar pendukung */
        .hero-view.is-preview { background: #1a1a1a; }
        .hero-view.is-preview img { object-fit: contain; }

        .btn-chat-wa {
            background-color: var(--dark) !important;
            color: #ffffff !important;
            display: flex; align-items: center; justify-content: center;
            gap: 8px; padding: 0.8rem; border-radius: 0.8rem;
            text-align: center; font-weight: 800; font-size: 10px;
            text-transform: uppercase;
        }

        .kpr-result-box {
            background-color: var(--dark) !important;
            padding: 2.5rem; border-radius: 2rem; text-align: center;
        }

        .kpr-result-value {
            color: #ffffff !important;
            font-size: 1.8rem; font-weight: 900; margin-bottom: 2rem; display: block;
        }

        .phase-btn {
            padding: 10px 20px; border-radius: 12px; font-size: 11px;
            font-weight: 800; border: 1px solid #eee; background: white;
            white-space: nowrap; transition: 0.3s; color: var(--dark);
        }
        .phase-btn.active { background: var(--dark); color: white !important; }

        .swiper-slide { width: 180px !important; cursor: pointer; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .quick-tabs { display: flex; gap: 8px; justify-content: center; margin-top: 15px; }
        .is-transformed .quick-tabs { justify-content: flex-start; margin-top: 15px; }

        .tab-btn {
            padding: 8px 15px; background: white; border-radius: 50px; font-size: 9px;
            font-weight: 800; text-transform: uppercase; border: 1px solid #eee;
            display: flex; align-items: center; gap: 5px; color: var(--dark) !important;
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Logika Tarik Profil (Diperbarui agar lebih responsif)
        const trigger = document.getElementById('profile-trigger');
        const header = document.querySelector('header');
        let isDragging = false, startY = 0;

        const handleStart = (e) => {
            isDragging = true;
            startY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        };

        const handleMove = (e) => {
            if (!isDragging) return;
            const currentY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            const diff = startY - currentY; // Nilai positif = swipe ke atas (scroll down)

            if (diff > 30) {
                header.classList.add('is-transformed');
                isDragging = false; 
            } else if (diff < -30 && window.scrollY <= 10) {
                header.classList.remove('is-transformed');
                isDragging = false;
            }
        };

        const handleEnd = () => { isDragging = false; };

        trigger.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        trigger.addEventListener('touchstart', handleStart, { passive: true });
        window.addEventListener('touchmove', handleMove, { passive: true });
        window.addEventListener('touchend', handleEnd);

        // Diubah threshold-nya agar langsung responsif saat di-scroll sedikit
        window.addEventListener('scroll', () => {
            if (window.scrollY > 30) header.classList.add('is-transformed');
            else if (!isDragging && window.scrollY <= 30) header.classList.remove('is-transformed');
        }, { passive: true });

        const WA_NUMBER = "628111982833";
        // Data unit disingkat untuk keterbacaan (gunakan data asli Anda di sini)
        const unitData = {
            5: [ { name: "Perunggu Livin Tipe B", tag: "305 Jt", val: 305000000, photos: ["unit-1.jpg", "unit-1.1.jpg"] } ],
            6: [ { name: "Perunggu Livin Tipe B", tag: "315 Jt", val: 315000000, photos: ["unit-1.jpg", "unit-1.1.jpg"] } ],
            7: [ { name: "Perunggu Beverly Livin", tag: "325 Jt", val: 325000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                 { name: "Silver Beverly Livin", tag: "410 Jt", val: 410000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg"] } ]
        };

        let activeSwipers = [];

        function renderUnits(fase) {
            const list = document.getElementById('unit-list');
            list.innerHTML = '';
            activeSwipers.forEach(s => s.destroy());
            activeSwipers = [];

            document.querySelectorAll('.phase-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${fase}`));

            unitData[fase].forEach((u, i) => {
                const uid = `u-${fase}-${i}`;
                const folder = `fase-${fase}/`;
                const heroSrc = folder + u.photos[0];
                const thumbHtml = u.photos.slice(1).map(p => `
                    <div class="swiper-slide" onclick="previewImage('${uid}', '${folder}${p}')">
                        <img src="${folder}${p}" class="w-full h-full object-cover rounded-lg" onerror="this.src='https://placehold.co/400x300?text=Detail'">
                    </div>
                `).join('');

                list.innerHTML += `
                    <div class="unit-card">
                        <div class="hero-view cursor-pointer" id="hero-container-${uid}" onclick="resetHero('${uid}', '${heroSrc}')">
                            <img id="hero-img-${uid}" class="blend-multiply" src="${heroSrc}" onerror="this.src='https://placehold.co/800x600?text=${u.name}'">
                        </div>
                        <div class="py-4">
                            <p class="px-6 text-[7px] font-black text-gray-300 uppercase tracking-widest mb-2">Ketuk untuk lihat detail</p>
                            <div class="swiper" id="swiper-${uid}"><div class="swiper-wrapper">${thumbHtml}</div></div>
                        </div>
                        <div class="px-6 pb-8">
                            <h4 class="font-black text-xl uppercase tracking-tighter mb-4">${u.name}</h4>
                            <div class="flex flex-col gap-3">
                                <div class="bg-[#fdfbf7] p-4 rounded-2xl border border-gray-100">
                                    <p class="text-[7px] font-bold text-gray-400 uppercase">Mulai Dari</p>
                                    <p class="font-black text-lg text-[#a68966]">Rp ${u.tag}</p>
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    <button onclick="setKPR(${u.val})" class="bg-white border py-3 rounded-xl text-[8px] font-black uppercase hover:bg-gray-50 transition">Simulasi KPR</button>
                                    <a href="https://wa.me/${WA_NUMBER}?text=Halo%20Echi,%20info%20unit%20${u.name}" target="_blank" class="btn-chat-wa hover:opacity-90 transition">
                                        <i class="fa-brands fa-whatsapp"></i><span>Tanya Echi</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            setTimeout(() => { 
                unitData[fase].forEach((u, i) => {
                    activeSwipers.push(new Swiper(`#swiper-u-${fase}-${i}`, { 
                        slidesPerView: "auto", spaceBetween: 10, slidesOffsetBefore: 24, slidesOffsetAfter: 24,
                        loop: false
                    }));
                }); 
            }, 100);
        }

        function toggleMenu(s) { document.getElementById('mobile-menu').classList.toggle('hidden', !s); document.getElementById('mobile-menu').classList.toggle('flex', s); }
        
        // Logika untuk menghapus blend-mode saat gambar detail di klik
        function previewImage(id, src) { 
            const img = document.getElementById(`hero-img-${id}`);
            const container = document.getElementById(`hero-container-${id}`);
            img.src = src; 
            img.classList.remove('blend-multiply'); // Cabut blend-mode
            container.classList.add('is-preview'); // Ubah warna container
        }
        
        // Logika untuk mengembalikan blend-mode saat reset (klik gambar utama)
        function resetHero(id, src) { 
            const img = document.getElementById(`hero-img-${id}`);
            const container = document.getElementById(`hero-container-${id}`);
            img.src = src; 
            img.classList.add('blend-multiply'); // Kembalikan blend-mode
            container.classList.remove('is-preview'); // Kembalikan warna container
        }

        function formatRibuan(n) { return

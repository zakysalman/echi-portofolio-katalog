<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nefsi Asrifah | Echi - Property Consultant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        :root {
            --gold: #a68966;
            --dark: #2d241d;
            --cream: #fdfbf7;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--cream); 
            color: var(--dark); 
            margin: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .nav-glass { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(10px); 
            z-index: 1000; 
            border-bottom: 1px solid #f0f0f0;
        }

        /* --- SOSIAL MEDIA ICONS --- */
        .social-link {
            color: var(--dark);
            transition: all 0.3s ease;
            opacity: 0.7;
        }
        .social-link:hover {
            color: var(--gold);
            opacity: 1;
            transform: translateY(-2px);
        }

        .profile-socials {
            display: flex; gap: 12px; justify-content: center; margin-top: 12px; margin-bottom: 12px; transition: all 0.4s ease;
        }
        .is-transformed .profile-socials { justify-content: flex-start; margin-top: 8px; margin-bottom: 0px; }

        /* --- PROFILE DRAG & TRANSFORM --- */
        #profile-trigger { touch-action: pan-y; cursor: grab; position: relative; z-index: 10; }
        .profile-container {
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; flex-direction: column; align-items: center; text-align: center;
            padding-top: 100px; padding-bottom: 30px; width: 100%; max-width: 800px; margin: 0 auto;
        }
        .profile-image-wrapper {
            width: 110px; height: 110px; border-radius: 50%; overflow: hidden; border: 4px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); margin-bottom: 20px;
        }
        .is-transformed .profile-container { flex-direction: row; text-align: left; padding: 90px 20px 20px; }
        .is-transformed .profile-image-wrapper { width: 120px; height: 120px; border-radius: 24px; margin-bottom: 0; margin-right: 20px; }

        /* --- DYNAMIC RATIO & BLEND MODE --- */
        .hero-view {
            width: 100%; aspect-ratio: 1/1; /* Default 1:1 */
            background: #f5f5f5; overflow: hidden; position: relative;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .hero-view.is-preview { aspect-ratio: 16/9; background: #1a1a1a; }
        .hero-view img { width: 100%; height: 100%; object-fit: cover; transition: all 0.3s ease; }
        .blend-multiply { mix-blend-mode: multiply; }

        .btn-back-main {
            position: absolute; bottom: 15px; background: rgba(255,255,255,0.9);
            padding: 8px 15px; border-radius: 50px; font-size: 9px; font-weight: 900;
            color: var(--dark); text-transform: uppercase; display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 10;
        }
        .is-preview .btn-back-main { display: block; }

        /* --- UI ELEMENTS --- */
        .unit-card { background: white; border-radius: 2rem; overflow: hidden; border: 1px solid #f0ebe3; margin-bottom: 2.5rem; }
        .phase-btn { padding: 10px 20px; border-radius: 12px; font-size: 11px; font-weight: 800; border: 1px solid #eee; transition: 0.3s; }
        .phase-btn.active { background: var(--dark); color: white !important; }
        .swiper-slide { width: 160px !important; }
        .tab-btn { padding: 8px 15px; background: white; border-radius: 50px; font-size: 9px; font-weight: 800; border: 1px solid #eee; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full nav-glass px-6 py-4 flex justify-between items-center">
        <div class="font-extrabold text-sm tracking-tighter uppercase">NEFSI ASRIFAH <span class="text-[#a68966]">| ECHI</span></div>
        <div class="flex items-center gap-4">
            <div class="hidden sm:flex gap-3">
                <a href="#" class="social-link"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" class="social-link"><i class="fa-brands fa-tiktok"></i></a>
            </div>
            <button onclick="toggleMenu(true)" class="p-1"><i class="fa-solid fa-bars text-xl"></i></button>
        </div>
    </nav>

    <div id="mobile-menu" class="hidden fixed inset-0 bg-white z-[2000] flex-col items-center justify-center">
        <button onclick="toggleMenu(false)" class="absolute top-8 right-8 text-2xl"><i class="fa-solid fa-xmark"></i></button>
        <a href="#top" onclick="toggleMenu(false)" class="text-xl font-black mb-6">BERANDA</a>
        <a href="#katalog" onclick="toggleMenu(false)" class="text-xl font-black mb-6">KATALOG</a>
        <div class="flex gap-6 mt-10 text-3xl">
            <a href="#" class="social-link"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" class="social-link"><i class="fa-brands fa-tiktok"></i></a>
            <a href="https://wa.me/628111982833" class="social-link"><i class="fa-brands fa-whatsapp"></i></a>
        </div>
    </div>

    <header id="top" class="w-full">
        <div id="profile-trigger" class="profile-container">
            <div class="profile-image-wrapper">
                <img src="wajah.jpg" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400?text=Echi'">
            </div>
            <div class="profile-text-content">
                <span class="text-[8px] font-bold text-[#a68966] uppercase tracking-[0.3em] mb-1 block">Property Consultant</span>
                <h1 class="text-2xl font-black tracking-tighter mb-1 uppercase">Estate by Echi</h1>
                <p class="text-gray-400 text-[9px] max-w-[250px] leading-tight font-medium">Konsultan properti pilihan untuk Park Serpong.</p>
                <div class="profile-socials text-lg">
                    <a href="#" class="social-link"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" class="social-link"><i class="fa-brands fa-tiktok"></i></a>
                    <a href="#" class="social-link"><i class="fa-brands fa-linkedin"></i></a>
                </div>
                <div class="quick-tabs">
                    <a href="#katalog" class="tab-btn"><i class="fa-solid fa-house"></i> UNIT</a>
                    <a href="#kpr" class="tab-btn"><i class="fa-solid fa-calculator"></i> KPR</a>
                </div>
            </div>
        </div>
    </header>

    <section id="katalog" class="py-10 px-4">
        <div class="max-w-4xl mx-auto">
            <div class="flex gap-2 overflow-x-auto no-scrollbar mb-6 pb-2 justify-center">
                <button onclick="renderUnits(7)" id="btn-7" class="phase-btn active">FASE 07</button>
                <button onclick="renderUnits(6)" id="btn-6" class="phase-btn">FASE 06</button>
                <button onclick="renderUnits(5)" id="btn-5" class="phase-btn">FASE 05</button>
            </div>
            <div id="unit-list"></div>
        </div>
    </section>

    <section id="kpr" class="py-16 px-4 bg-white border-t">
        <div class="max-w-md mx-auto">
            <h3 class="text-center font-black uppercase text-[#a68966] mb-10">Simulasi Cicilan</h3>
            <div class="space-y-4">
                <div class="bg-[#fdfbf7] p-6 rounded-2xl border">
                    <label class="text-[8px] font-bold text-gray-400 uppercase block mb-2">Harga Unit</label>
                    <div class="flex items-center">
                        <span class="text-gray-400 font-bold mr-2">Rp</span>
                        <input type="text" id="kpr-disp" value="325.000.000" oninput="formatAndCalc(this)" class="w-full bg-transparent border-none outline-none text-2xl font-black tracking-tighter">
                    </div>
                    <input type="hidden" id="kpr-raw" value="325000000">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-[#fdfbf7] p-4 rounded-2xl border">
                        <label class="text-[8px] font-bold text-gray-400 uppercase block mb-1">DP (%)</label>
                        <input type="number" id="dp-val" value="5" oninput="calc()" class="w-full bg-transparent border-none font-bold text-lg outline-none">
                    </div>
                    <div class="bg-[#fdfbf7] p-4 rounded-2xl border">
                        <label class="text-[8px] font-bold text-gray-400 uppercase block mb-1">Tenor (Thn)</label>
                        <input type="number" id="tenor-val" value="20" oninput="calc()" class="w-full bg-transparent border-none font-bold text-lg outline-none">
                    </div>
                </div>
                <div class="mt-8 bg-[#2d241d] p-10 rounded-3xl text-center">
                    <p class="text-[9px] font-bold text-gray-400 uppercase mb-3">Estimasi Cicilan</p>
                    <span id="hasil-cicilan" class="text-white text-3xl font-black block mb-6">Rp 2.050.000</span>
                    <a href="https://wa.me/628111982833" target="_blank" class="block py-4 bg-[#a68966] text-white rounded-xl font-bold text-[10px] uppercase">Konsultasi WA</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-12 text-center text-[8px] font-bold text-gray-300 uppercase tracking-widest">
        &copy; 2024 NEFSI ASRIFAH | ECHI PROPERTY
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Logika Geser Profil
        const trigger = document.getElementById('profile-trigger');
        const header = document.querySelector('header');
        let isDragging = false, startY = 0;

        trigger.addEventListener('touchstart', (e) => { isDragging = true; startY = e.touches[0].clientY; });
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const currentY = e.touches[0].clientY;
            if (currentY - startY > 30) header.classList.add('is-transformed');
            else if (currentY - startY < -20) header.classList.remove('is-transformed');
        });
        window.addEventListener('scroll', () => {
            if (window.scrollY > 40) header.classList.add('is-transformed');
            else header.classList.remove('is-transformed');
        });

        const unitData = {
            7: [
                { name: "Perunggu Beverly Livin", tag: "325 Jt", val: 325000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Silver Beverly Livin", tag: "410 Jt", val: 410000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { name: "Urban Beverly Livin", tag: "500 Jt", val: 500000000, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] },
                { name: "TreeTops Beverly Livin", tag: "550 Jt", val: 550000000, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg"] },
                { name: "Gold Beverly Livin", tag: "610 Jt", val: 610000000, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg", "unit-5.3.jpg"] },
                { name: "GoldTops Beverly Livin", tag: "690 Jt", val: 690000000, photos: ["unit-6.jpg", "unit-6.1.jpg", "unit-6.2.jpg", "unit-6.3.jpg"] }
            ],
            6: [
                { name: "Perunggu Livin Tipe B", tag: "315 Jt", val: 315000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Quartz Livin Tipe Q", tag: "460 Jt", val: 460000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { name: "TreeTops Livin", tag: "530 Jt", val: 530000000, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] },
                { name: "Gold Livin Tipe G", tag: "595 Jt", val: 595000000, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg"] },
                { name: "GoldTops Livin Type GT", tag: "670 Jt", val: 670000000, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg", "unit-5.3.jpg", "unit-5.4.jpg"] }
            ],
            5: [
                { name: "Perunggu Livin Tipe B", tag: "305 Jt", val: 305000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Perunggu Livin Tipe BB", tag: "390 Jt", val: 390000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { name: "Quartz Livin Tipe Q", tag: "450 Jt", val: 450000000, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] },
                { name: "TreeTops Livin Tipe", tag: "520 Jt", val: 520000000, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg", "unit-4.4.jpg"] },
                { name: "Gold Livin Tipe G", tag: "580 Jt", val: 580000000, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg", "unit-5.3.jpg"] },
                { name: "GoldTops Livin Type GT", tag: "650 Jt", val: 650000000, photos: ["unit-6.jpg", "unit-6.1.jpg", "unit-6.2.jpg", "unit-6.3.jpg"] }
            ]
        };

        let activeSwipers = [];

        function renderUnits(fase) {
            const list = document.getElementById('unit-list');
            list.innerHTML = '';
            activeSwipers.forEach(s => s.destroy());
            activeSwipers = [];

            document.querySelectorAll('.phase-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${fase}`));

            unitData[fase].forEach((u, i) => {
                const uid = `u-${fase}-${i}`;
                const folder = `fase-${fase}/`;
                const mainImg = folder + u.photos[0];
                const thumbHtml = u.photos.slice(1).map(p => `
                    <div class="swiper-slide" onclick="previewImage('${uid}', '${folder}${p}')">
                        <img src="${folder}${p}" class="w-full h-full object-cover rounded-2xl" onerror="this.src='https://placehold.co/400x300?text=Detail'">
                    </div>
                `).join('');

                list.innerHTML += `
                    <div class="unit-card">
                        <div class="hero-view" id="cont-${uid}">
                            <img id="img-${uid}" class="blend-multiply" src="${mainImg}" onerror="this.src='https://placehold.co/800x800?text=${u.name}'">
                            <button onclick="resetHero('${uid}', '${mainImg}')" class="btn-back-main">KEMBALI KE FOTO UTAMA</button>
                        </div>
                        <div class="py-4">
                            <div class="swiper px-6" id="sw-${uid}"><div class="swiper-wrapper">${thumbHtml}</div></div>
                        </div>
                        <div class="px-6 pb-8">
                            <h4 class="font-black text-xl uppercase tracking-tighter mb-4">${u.name}</h4>
                            <div class="flex flex-col gap-3">
                                <div class="bg-[#fdfbf7] p-4 rounded-2xl border border-gray-100 flex justify-between items-center">
                                    <div><p class="text-[7px] font-bold text-gray-400 uppercase">Harga Mulai</p><p class="font-black text-lg text-[#a68966]">Rp ${u.tag}</p></div>
                                    <button onclick="setKPR(${u.val})" class="bg-white border px-4 py-2 rounded-xl text-[8px] font-black uppercase">Simulasi</button>
                                </div>
                                <a href="https://wa.me/628111982833?text=Halo%20Echi,%20info%20${u.name}" target="_blank" class="bg-[#2d241d] text-white flex items-center justify-center gap-2 p-4 rounded-2xl font-black text-[10px] uppercase">
                                    <i class="fa-brands fa-whatsapp text-lg"></i> Tanya Echi
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            });

            setTimeout(() => {
                unitData[fase].forEach((u, i) => {
                    activeSwipers.push(new Swiper(`#sw-u-${fase}-${i}`, { 
                        slidesPerView: "auto", spaceBetween: 10, loop: true, autoplay: { delay: 3000 } 
                    }));
                });
            }, 100);
        }

        function previewImage(id, src) {
            const cont = document.getElementById(`cont-${id}`);
            const img = document.getElementById(`img-${id}`);
            cont.classList.add('is-preview');
            img.src = src;
            img.classList.remove('blend-multiply');
        }

        function resetHero(id, src) {
            const cont = document.getElementById(`cont-${id}`);
            const img = document.getElementById(`img-${id}`);
            cont.classList.remove('is-preview');
            img.src = src;
            img.classList.add('blend-multiply');
        }

        function toggleMenu(s) { document.getElementById('mobile-menu').classList.toggle('hidden', !s); document.getElementById('mobile-menu').classList.toggle('flex', s); }
        function formatRibuan(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function formatAndCalc(el) { let v = el.value.replace(/\D/g, ""); document.getElementById('kpr-raw').value = v; el.value = formatRibuan(v); calc(); }
        function calc() {
            const h = parseFloat(document.getElementById('kpr-raw').value) || 0, dp = parseFloat(document.getElementById('dp-val').value) || 0, t = parseFloat(document.getElementById('tenor-val').value) || 1;
            const p = h - (h * dp / 100), b = 0.05 / 12, m = t * 12;
            const c = (p * b) / (1 - Math.pow(1 + b, -m));
            document.getElementById('hasil-cicilan').innerText = "Rp " + formatRibuan(Math.round(c || 0));
        }
        function setKPR(v) { document.getElementById('kpr-raw').value = v; document.getElementById('kpr-disp').value = formatRibuan(v); calc(); document.getElementById('kpr').scrollIntoView({ behavior: 'smooth' }); }

        window.onload = () => { renderUnits(7); calc(); };
    </script>
</body>
</html>

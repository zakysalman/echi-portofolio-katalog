<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nefsi Asrifah | Echi - Property Consultant</title>
    
    <!-- Framework & Library -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        :root {
            --gold: #a68966;
            --page-bg: #fdfbf7;
            --card-cream: #f9f9f2; 
            --dark: #2d241d;
        }

        /* Base Styling */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--page-bg); 
            color: var(--dark); 
            margin: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Navigation */
        .nav-glass { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            z-index: 1000; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        /* --- ANIMASI PROFIL --- */
        .profile-container {
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding-top: 100px;
            padding-bottom: 30px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .profile-image-wrapper {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            margin-bottom: 20px;
            background: #fff;
        }

        /* Transformasi saat Scroll */
        .is-transformed .profile-container {
            flex-direction: row;
            align-items: center;
            text-align: left;
            padding-top: 90px;
            padding-left: 25px;
            padding-right: 25px;
            max-width: 100%;
        }

        .is-transformed .profile-image-wrapper {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            margin-bottom: 0;
            margin-right: 20px;
        }

        .is-transformed .profile-text h1 { font-size: 1.2rem; margin-bottom: 0; }
        .is-transformed .profile-text p { display: none; }

        /* --- UNIT CARD --- */
        .unit-card {
            background: var(--card-cream); 
            border-radius: 2.5rem; 
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
            margin-bottom: 4rem;
            border: 1px solid rgba(166, 137, 102, 0.08);
        }

        .hero-view {
            width: 100%; 
            aspect-ratio: 1/1; 
            background: #000; /* Harus hitam agar 'screen' bekerja sempurna */
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }

        /* Saat lihat foto detail (gallery) latar ganti putih */
        .hero-view.is-wide {
            aspect-ratio: 16/9;
            background: #fff; 
        }

        .hero-view img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain;
            mix-blend-mode: screen; 
            filter: contrast(1.1); /* Mempertegas hitam benar-benar hilang */
            transition: opacity 0.3s ease;
        }

        /* Normal mode untuk foto detail */
        .hero-view.no-blend img {
            mix-blend-mode: normal !important;
            filter: none !important;
            object-fit: cover;
        }

        .card-content { padding: 2rem; }
        .unit-title { font-weight: 800; font-size: 1.6rem; text-transform: uppercase; margin-bottom: 1.2rem; }

        .thumb-img-wrapper {
            width: 100%; aspect-ratio: 16/9; overflow: hidden;
            border-radius: 20px; cursor: pointer; background: #f0f0f0;
        }

        .btn-chat-wa {
            background-color: var(--dark) !important; color: #fff !important;
            display: flex; align-items: center; justify-content: center;
            gap: 12px; padding: 1.2rem; border-radius: 1.5rem;
            font-weight: 800; font-size: 12px; text-transform: uppercase;
        }

        .price-box {
            background: white; padding: 1.5rem; border-radius: 2rem;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem; border: 1px solid rgba(0,0,0,0.02);
        }

        .phase-btn {
            padding: 12px 24px; border-radius: 15px; font-size: 11px;
            font-weight: 800; border: 1px solid #eee; background: white;
            transition: 0.3s; color: #999;
        }
        .phase-btn.active { background: var(--dark); color: white !important; border-color: var(--dark); }

        .swiper-slide { width: 220px !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full nav-glass px-6 py-5 flex justify-between items-center">
        <div class="font-extrabold text-sm tracking-tighter uppercase">NEFSI ASRIFAH <span class="text-[#a68966]">| ECHI</span></div>
        <button onclick="toggleMenu(true)" class="p-1"><i class="fa-solid fa-bars-staggered text-xl"></i></button>
    </nav>

    <div id="mobile-menu" class="hidden fixed inset-0 bg-white z-[2000] flex-col items-center justify-center p-10">
        <button onclick="toggleMenu(false)" class="absolute top-10 right-10 text-3xl"><i class="fa-solid fa-xmark"></i></button>
        <div class="flex flex-col items-center gap-10">
            <a href="#top" onclick="toggleMenu(false)" class="text-3xl font-black uppercase">Home</a>
            <a href="#katalog" onclick="toggleMenu(false)" class="text-3xl font-black uppercase">Katalog</a>
            <a href="#kpr" onclick="toggleMenu(false)" class="text-3xl font-black uppercase">Simulasi KPR</a>
        </div>
    </div>

    <header id="top">
        <div id="profile-area" class="profile-container">
            <div class="profile-image-wrapper">
                <img src="wajah.jpg" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400/eee/a68966?text=ECHI'">
            </div>
            <div class="profile-text">
                <span class="text-[9px] font-bold text-[#a68966] uppercase tracking-[0.4em] mb-2 block">Property Consultant</span>
                <h1 class="text-3xl font-black tracking-tighter mb-1 uppercase">Estate by Echi</h1>
                <p class="text-gray-400 text-[11px] max-w-[280px] leading-relaxed mx-auto">Luxury living with Park Serpong expert consultant.</p>
            </div>
        </div>
    </header>

    <section id="katalog" class="py-10 px-5">
        <div class="max-w-4xl mx-auto">
            <div class="flex gap-3 overflow-x-auto no-scrollbar mb-12 pb-2 justify-center">
                <button onclick="renderUnits(7)" id="btn-7" class="phase-btn active">FASE 07</button>
                <button onclick="renderUnits(6)" id="btn-6" class="phase-btn">FASE 06</button>
                <button onclick="renderUnits(5)" id="btn-5" class="phase-btn">FASE 05</button>
            </div>
            <div id="unit-list"></div>
        </div>
    </section>

    <section id="kpr" class="py-20 px-6 bg-white border-t">
        <div class="max-w-md mx-auto">
            <div class="text-center mb-12">
                <h3 class="font-black uppercase text-[#a68966] mb-2 text-sm tracking-widest">Mortgage Calculator</h3>
                <p class="text-[10px] text-gray-400 uppercase font-bold">Rencanakan hunian impian Anda</p>
            </div>
            <div class="space-y-5">
                <div class="bg-[#fdfbf7] p-6 rounded-3xl border border-gray-100">
                    <label class="text-[10px] font-bold text-gray-400 uppercase block mb-3">Estimasi Harga Unit</label>
                    <div class="flex items-center">
                        <span class="text-gray-300 font-bold mr-3 text-2xl">Rp</span>
                        <input type="text" id="kpr-disp" value="325.000.000" oninput="formatAndCalc(this)" class="w-full bg-transparent border-none outline-none text-3xl font-black tracking-tighter">
                    </div>
                    <input type="hidden" id="kpr-raw" value="325000000">
                </div>
                <div class="grid grid-cols-2 gap-5">
                    <div class="bg-[#fdfbf7] p-5 rounded-3xl border border-gray-100">
                        <label class="text-[10px] font-bold text-gray-400 uppercase block mb-2">DP (%)</label>
                        <input type="number" id="dp-val" value="5" oninput="calc()" class="w-full bg-transparent border-none font-bold text-xl outline-none">
                    </div>
                    <div class="bg-[#fdfbf7] p-5 rounded-3xl border border-gray-100">
                        <label class="text-[10px] font-bold text-gray-400 uppercase block mb-2">Tenor (Tahun)</label>
                        <input type="number" id="tenor-val" value="20" oninput="calc()" class="w-full bg-transparent border-none font-bold text-xl outline-none">
                    </div>
                </div>
                <div class="mt-10 p-10 bg-[#2d241d] text-white rounded-[3rem] text-center">
                    <p class="text-[11px] font-black uppercase mb-4 opacity-40">Angsuran Per Bulan</p>
                    <span id="hasil-cicilan" class="text-3xl font-black block mb-8">Rp 2.050.000</span>
                    <a href="https://wa.me/628111982833" target="_blank" class="block w-full py-5 bg-[#a68966] text-white rounded-2xl font-bold text-[12px] uppercase tracking-widest">Hubungi Echi Sekarang</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-20 text-center">
        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">&copy; 2024 NEFSI ASRIFAH | PARK SERPONG</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const WA_NUMBER = "628111982833";
        const unitData = {
            "5": [
                { "name": "Perunggu Livin Tipe B", "tag": "305 Jt", "val": 305000000, "photos": ["fase-5/unit-1.jpg", "fase-5/unit-1.1.jpg", "fase-5/unit-1.2.jpg", "fase-5/unit-1.3.jpg"] },
                { "name": "Perunggu BB", "tag": "390 Jt", "val": 390000000, "photos": ["fase-5/unit-2.jpg", "fase-5/unit-2.1.jpg", "fase-5/unit-2.2.jpg", "fase-5/unit-2.3.jpg"] },
                { "name": "Quartz Livin Q", "tag": "450 Jt", "val": 450000000, "photos": ["fase-5/unit-3.jpg", "fase-5/unit-3.1.jpg", "fase-5/unit-3.2.jpg", "fase-5/unit-3.3.jpg"] },
                { "name": "TreeTops Livin", "tag": "520 Jt", "val": 520000000, "photos": ["fase-5/unit-4.jpg", "fase-5/unit-4.1.jpg", "fase-5/unit-4.2.jpg", "fase-5/unit-4.3.jpg", "fase-5/unit-4.4.jpg"] },
                { "name": "Gold Livin G", "tag": "580 Jt", "val": 580000000, "photos": ["fase-5/unit-5.jpg", "fase-5/unit-5.1.jpg", "fase-5/unit-5.2.jpg", "fase-5/unit-5.3.jpg"] },
                { "name": "GoldTops GT", "tag": "650 Jt", "val": 650000000, "photos": ["fase-5/unit-6.jpg", "fase-5/unit-6.1.jpg", "fase-5/unit-6.2.jpg", "fase-5/unit-6.3.jpg"] }
            ],
            "6": [
                { "name": "Perunggu Tipe B", "tag": "315 Jt", "val": 315000000, "photos": ["fase-6/unit-1.jpg", "fase-6/unit-1.1.jpg", "fase-6/unit-1.2.jpg", "fase-6/unit-1.3.jpg"] },
                { "name": "Quartz Tipe Q", "tag": "460 Jt", "val": 460000000, "photos": ["fase-6/unit-2.jpg", "fase-6/unit-2.1.jpg", "fase-6/unit-2.2.jpg", "fase-6/unit-2.3.jpg"] },
                { "name": "TreeTops Livin", "tag": "530 Jt", "val": 530000000, "photos": ["fase-6/unit-3.jpg", "fase-6/unit-3.1.jpg", "fase-6/unit-3.2.jpg", "fase-6/unit-3.3.jpg"] },
                { "name": "Gold Tipe G", "tag": "595 Jt", "val": 595000000, "photos": ["fase-6/unit-4.jpg", "fase-6/unit-4.1.jpg", "fase-6/unit-4.2.jpg", "fase-6/unit-4.3.jpg"] },
                { "name": "GoldTops Type GT", "tag": "670 Jt", "val": 670000000, "photos": ["fase-6/unit-5.jpg", "fase-6/unit-5.1.jpg", "fase-6/unit-5.2.jpg", "fase-6/unit-5.3.jpg", "fase-6/unit-5.4.jpg"] }
            ],
            "7": [
                { "name": "Perunggu Beverly", "tag": "325 Jt", "val": 325000000, "photos": ["fase-7/unit-1.jpg", "fase-7/unit-1.1.jpg", "fase-7/unit-1.2.jpg", "fase-7/unit-1.3.jpg"] },
                { "name": "Silver Beverly", "tag": "410 Jt", "val": 410000000, "photos": ["fase-7/unit-2.jpg", "fase-7/unit-2.1.jpg", "fase-7/unit-2.2.jpg", "fase-7/unit-2.3.jpg"] },
                { "name": "Urban Beverly", "tag": "500 Jt", "val": 500000000, "photos": ["fase-7/unit-3.jpg", "fase-7/unit-3.1.jpg", "fase-7/unit-3.2.jpg", "fase-7/unit-3.3.jpg"] },
                { "name": "TreeTops Beverly", "tag": "550 Jt", "val": 550000000, "photos": ["fase-7/unit-4.jpg", "fase-7/unit-4.1.jpg", "fase-7/unit-4.2.jpg", "fase-7/unit-4.3.jpg"] },
                { "name": "Gold Beverly", "tag": "610 Jt", "val": 610000000, "photos": ["fase-7/unit-5.jpg", "fase-7/unit-5.1.jpg", "fase-7/unit-5.2.jpg", "fase-7/unit-5.3.jpg"] },
                { "name": "GoldTops Beverly", "tag": "690 Jt", "val": 690000000, "photos": ["fase-7/unit-6.jpg", "fase-7/unit-6.1.jpg", "fase-7/unit-6.2.jpg", "fase-7/unit-6.3.jpg"] }
            ]
        };

        let activeSwipers = [];

        function renderUnits(fase) {
            const list = document.getElementById('unit-list');
            list.innerHTML = '';
            activeSwipers.forEach(s => s.destroy());
            activeSwipers = [];
            document.querySelectorAll('.phase-btn').forEach(btn => btn.classList.toggle('active', btn.id === `btn-${fase}`));

            unitData[fase].forEach((unit, index) => {
                const uid = `unit-${fase}-${index}`;
                const hero = unit.photos[0];
                const thumbs = unit.photos.slice(1).map(p => `
                    <div class="swiper-slide" onclick="previewImage('${uid}', '${p}')">
                        <div class="thumb-img-wrapper"><img src="${p}" onerror="this.src='https://placehold.co/600x337/eee/999?text=Gallery'"></div>
                    </div>`).join('');

                list.innerHTML += `
                    <div class="unit-card">
                        <div class="hero-view" id="hero-cont-${uid}" onclick="resetHero('${uid}', '${hero}')">
                            <img id="hero-img-${uid}" src="${hero}" onerror="this.src='https://placehold.co/600x600/000/222?text=${unit.name}'">
                        </div>
                        <div class="card-content">
                            <h4 class="unit-title">${unit.name}</h4>
                            <div class="mb-8"><div class="swiper" id="swiper-${uid}"><div class="swiper-wrapper">${thumbs}</div></div></div>
                            <div class="price-box">
                                <div><p class="text-[8px] font-bold text-gray-400 mb-1">Estimasi Harga</p><p class="font-black text-2xl">Rp ${unit.tag}</p></div>
                                <button onclick="setKPR(${unit.val})" class="bg-gray-100 px-5 py-3 rounded-2xl text-[10px] font-black uppercase">Hitung KPR</button>
                            </div>
                            <a href="https://wa.me/${WA_NUMBER}?text=Halo%20Echi,%20info%20unit%20${unit.name}" target="_blank" class="btn-chat-wa">
                                <i class="fa-brands fa-whatsapp text-lg"></i><span>Konsultasi WhatsApp</span>
                            </a>
                        </div>
                    </div>`;
            });
            setTimeout(() => { unitData[fase].forEach((u, i) => { activeSwipers.push(new Swiper(`#swiper-unit-${fase}-${i}`, { slidesPerView: "auto", spaceBetween: 20, freeMode: true })); }); }, 150);
        }

        function previewImage(id, src) {
            const c = document.getElementById(`hero-cont-${id}`), i = document.getElementById(`hero-img-${id}`);
            c.classList.add('is-wide', 'no-blend');
            i.style.opacity = '0'; setTimeout(() => { i.src = src; i.style.opacity = '1'; }, 200);
        }

        function resetHero(id, src) {
            const c = document.getElementById(`hero-cont-${id}`), i = document.getElementById(`hero-img-${id}`);
            c.classList.remove('is-wide', 'no-blend');
            i.style.opacity = '0'; setTimeout(() => { i.src = src; i.style.opacity = '1'; }, 200);
        }

        function formatRibuan(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function formatAndCalc(el) { let v = el.value.replace(/\D/g, ""); document.getElementById('kpr-raw').value = v; el.value = formatRibuan(v); calc(); }
        function calc() {
            const h = parseFloat(document.getElementById('kpr-raw').value) || 0, d = parseFloat(document.getElementById('dp-val').value) || 0, t = parseFloat(document.getElementById('tenor-val').value) || 1;
            const p = h - (h * d / 100), b = 0.05 / 12, m = t * 12;
            const c = (p * b) / (1 - Math.pow(1 + b, -m));
            document.getElementById('hasil-cicilan').innerText = "Rp " + formatRibuan(Math.round(c || 0));
        }
        function setKPR(v) { document.getElementById('kpr-raw').value = v; document.getElementById('kpr-disp').value = formatRibuan(v); calc(); document.getElementById('kpr').scrollIntoView({ behavior: 'smooth' }); }
        function toggleMenu(s) { const m = document.getElementById('mobile-menu'); m.classList.toggle('hidden', !s); m.classList.toggle('flex', s); }
        window.addEventListener('scroll', () => { if (window.scrollY > 60) document.querySelector('header').classList.add('is-transformed'); else document.querySelector('header').classList.remove('is-transformed'); });
        window.onload = () => { renderUnits(7); calc(); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nefsi Asrifah | Echi - Property Consultant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --gold: #a68966;
            --dark: #4a3728;
            --cream: #fdfbf7;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--cream); 
            color: var(--dark); 
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-glass { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(10px); 
            z-index: 1000; 
            border-bottom: 1px solid #eee;
        }

        .unit-card {
            background: white;
            border-radius: 2.5rem;
            overflow: hidden;
            border: 1px solid #f0ebe3;
            box-shadow: 0 10px 40px rgba(74, 55, 40, 0.03);
            margin-bottom: 3.5rem;
            display: flex;
            flex-direction: column;
        }

        /* Unit Utama (Frame Tetap 4:3) */
        .hero-view {
            width: 100%;
            aspect-ratio: 4/3;
            background: #1a1a1a; /* Latar gelap untuk area kosong saat no-crop */
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Logika No-Crop: Gambar utama pakai cover, gambar preview pakai contain */
        .hero-view img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Default untuk foto utama agar penuh */
            transition: all 0.4s ease;
            opacity: 1;
        }

        /* Class khusus saat menampilkan foto pendukung (Tanpa Crop) */
        .hero-view.is-preview img {
            object-fit: contain; /* Seluruh foto terlihat tanpa terpotong */
            background: #1a1a1a;
        }

        /* Galeri Pendukung (16:9) */
        .gallery-container {
            padding: 20px 0;
            background: #fff;
        }
        .swiper-slide {
            width: 220px; 
            aspect-ratio: 16/9; 
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            background: #f0ebe3;
            transition: all 0.2s ease;
        }
        .swiper-slide.active-thumb {
            border-color: var(--gold);
            transform: scale(0.92);
        }
        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .phase-btn {
            padding: 10px 22px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 800;
            border: 1px solid #eee;
            background: white;
            transition: 0.3s;
            white-space: nowrap;
        }
        .phase-btn.active {
            background: var(--dark);
            color: white;
            border-color: var(--dark);
            box-shadow: 0 4px 15px rgba(74, 55, 40, 0.15);
        }

        #mobile-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .btn-action {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-action:active {
            transform: scale(0.95);
        }

        .reset-indicator {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(166, 137, 102, 0.9);
            color: white;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s;
            pointer-events: none;
            z-index: 10;
        }
        .hero-view.is-preview .reset-indicator {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full nav-glass px-6 py-4 flex justify-between items-center">
        <div class="font-extrabold text-sm tracking-tighter uppercase">NEFSI ASRIFAH <span class="text-[#a68966]">| ECHI</span></div>
        <button onclick="document.getElementById('mobile-menu').style.display='flex'" class="p-2 text-dark"><i class="fa-solid fa-bars-staggered text-xl"></i></button>
    </nav>

    <div id="mobile-menu">
        <button onclick="document.getElementById('mobile-menu').style.display='none'" class="absolute top-6 right-6 text-3xl"><i class="fa-solid fa-xmark"></i></button>
        <a href="#top" onclick="document.getElementById('mobile-menu').style.display='none'" class="py-5 text-2xl font-black uppercase">Beranda</a>
        <a href="#katalog" onclick="document.getElementById('mobile-menu').style.display='none'" class="py-5 text-2xl font-black uppercase">Katalog Unit</a>
        <a href="#kpr" onclick="document.getElementById('mobile-menu').style.display='none'" class="py-5 text-2xl font-black uppercase">Simulasi KPR</a>
    </div>

    <div id="top" class="pt-32 pb-12 px-6">
        <div class="max-w-4xl mx-auto flex flex-col items-center text-center">
            <div class="w-24 h-24 rounded-full overflow-hidden border-4 border-white shadow-xl mb-6">
                <img src="wajah.jpg" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400?text=Echi'">
            </div>
            <span class="text-[10px] font-extrabold text-[#a68966] uppercase tracking-[0.5em] mb-3">Official Property Consultant</span>
            <h1 class="text-4xl font-black tracking-tighter mb-4 uppercase">Estate by Echi</h1>
            <p class="text-gray-400 text-xs max-w-xs mx-auto leading-relaxed font-medium">Lihat detail hunian idaman Anda tanpa terpotong dengan fitur interaktif kami.</p>
        </div>
    </div>

    <section id="katalog" class="py-6 px-6">
        <div class="max-w-6xl mx-auto">
            <div class="flex gap-3 overflow-x-auto no-scrollbar mb-10 pb-2">
                <button onclick="renderUnits(7)" id="btn-7" class="phase-btn active">FASE 07</button>
                <button onclick="renderUnits(6)" id="btn-6" class="phase-btn">FASE 06</button>
                <button onclick="renderUnits(5)" id="btn-5" class="phase-btn">FASE 05</button>
            </div>
            
            <div id="unit-list" class="space-y-12">
                <!-- Konten dinamis dari JS -->
            </div>
        </div>
    </section>

    <section id="kpr" class="py-24 px-6 bg-white border-t border-gray-100">
        <div class="max-w-xl mx-auto">
            <h3 class="text-center font-black uppercase tracking-widest text-[#a68966] mb-12">Simulasi KPR</h3>
            <div class="space-y-5">
                <div class="bg-[#fdfbf7] p-6 rounded-3xl border border-gray-200">
                    <label class="text-[9px] font-black uppercase text-gray-400 block mb-2">Harga Properti</label>
                    <div class="flex items-center">
                        <span class="text-gray-300 font-bold mr-2">Rp</span>
                        <input type="text" id="kpr-disp" value="325.000.000" oninput="formatAndCalc(this)" class="w-full bg-transparent border-none outline-none text-2xl font-black tracking-tight">
                    </div>
                    <input type="hidden" id="kpr-raw" value="325000000">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-[#fdfbf7] p-6 rounded-3xl border border-gray-200">
                        <label class="text-[9px] font-black uppercase text-gray-400 block mb-2">DP (%)</label>
                        <input type="number" id="dp-val" value="5" oninput="calc()" class="w-full bg-transparent border-none font-black text-xl outline-none">
                    </div>
                    <div class="bg-[#fdfbf7] p-6 rounded-3xl border border-gray-200">
                        <label class="text-[9px] font-black uppercase text-gray-400 block mb-2">Tenor (Thn)</label>
                        <input type="number" id="tenor-val" value="20" oninput="calc()" class="w-full bg-transparent border-none font-black text-xl outline-none">
                    </div>
                </div>
                <div class="mt-12 bg-dark p-10 rounded-[3rem] text-center shadow-2xl">
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-3">Cicilan Per Bulan</p>
                    <h2 id="hasil-cicilan" class="text-4xl font-black text-white mb-10 tracking-tighter">Rp 2.050.000</h2>
                    <a id="wa-link" href="https://wa.me/628111982833" target="_blank" class="block w-full py-5 bg-[#a68966] text-white rounded-2xl font-black text-xs uppercase tracking-[0.2em] btn-action">Tanya Echi Sekarang</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-16 text-center text-[9px] font-bold text-gray-300 uppercase tracking-[0.6em]">
        &copy; 2024 Nefsi Asrifah | Echi Park Serpong
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const WA_NUMBER = "628111982833";
        const unitData = {
            5: [
                { name: "Perunggu Livin Tipe B", tag: "305 Jt", val: 305000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Perunggu Livin Tipe BB", tag: "390 Jt", val: 390000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { name: "Quartz Livin Tipe Q", tag: "450 Jt", val: 450000000, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] }
            ],
            6: [
                { name: "Perunggu Livin Tipe B", tag: "315 Jt", val: 315000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Quartz Livin Tipe Q", tag: "460 Jt", val: 460000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] }
            ],
            7: [
                { name: "Perunggu Beverly Livin", tag: "325 Jt", val: 325000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Silver Beverly Livin", tag: "410 Jt", val: 410000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { name: "Urban Beverly Livin", tag: "500 Jt", val: 500000000, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] },
                { name: "TreeTops Beverly Livin", tag: "550 Jt", val: 550000000, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg"] }
            ]
        };

        let activeSwipers = [];

        function renderUnits(fase) {
            const list = document.getElementById('unit-list');
            list.innerHTML = '';
            activeSwipers.forEach(s => s.destroy());
            activeSwipers = [];

            document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+fase).classList.add('active');

            unitData[fase].forEach((u, i) => {
                const uid = `u-${fase}-${i}`;
                const heroSrc = `fase-${fase}/${u.photos[0]}`;
                const galleryPhotos = u.photos.slice(1);
                
                const thumbHtml = galleryPhotos.map((p, idx) => `
                    <div class="swiper-slide" onclick="previewImage('${uid}', 'fase-${fase}/${p}', this)">
                        <img src="fase-${fase}/${p}" onerror="this.src='https://placehold.co/640x360/f7f3ed/a68966?text=Unit Detail'">
                    </div>
                `).join('');

                list.innerHTML += `
                    <div class="unit-card">
                        <!-- FRAME UTAMA -->
                        <div class="hero-view" id="hero-container-${uid}" onclick="resetHero('${uid}', '${heroSrc}')">
                            <div class="reset-indicator"><i class="fa-solid fa-rotate-left mr-1"></i> Kembali ke Utama</div>
                            <img id="hero-img-${uid}" src="${heroSrc}" onerror="this.src='https://placehold.co/800x600/f7f3ed/a68966?text=${u.name}'">
                        </div>

                        <!-- GALERI PENDUKUNG (16:9) -->
                        <div class="gallery-container">
                            <p class="px-8 text-[9px] font-black uppercase text-gray-300 tracking-widest mb-4">Pilih Detail (Klik untuk perbesar)</p>
                            <div class="swiper swiper-gallery" id="swiper-${uid}">
                                <div class="swiper-wrapper">
                                    ${thumbHtml}
                                </div>
                            </div>
                        </div>

                        <!-- KONTEN -->
                        <div class="px-8 pb-10">
                            <h4 class="font-black text-2xl uppercase tracking-tighter mb-6">${u.name}</h4>
                            
                            <div class="flex flex-col gap-4">
                                <div class="flex justify-between items-end bg-[#fdfbf7] p-6 rounded-3xl border border-gray-100">
                                    <div>
                                        <p class="text-[8px] font-black text-gray-300 uppercase mb-1">Mulai Dari</p>
                                        <p class="font-black text-xl text-[#a68966]">Rp ${u.tag}</p>
                                    </div>
                                    <span class="text-[8px] font-black text-gray-300 uppercase">Phase 0${fase}</span>
                                </div>

                                <div class="grid grid-cols-2 gap-3">
                                    <button onclick="setKPR(${u.val}, '${u.name}')" class="flex items-center justify-center gap-2 bg-white border border-gray-200 py-4 rounded-2xl btn-action">
                                        <i class="fa-solid fa-calculator text-[#a68966]"></i>
                                        <span class="text-[9px] font-black uppercase tracking-widest">Hitung KPR</span>
                                    </button>
                                    <a href="https://wa.me/${WA_NUMBER}?text=Halo%20Echi,%20info%20detail%20unit%20${u.name}%20dong." 
                                       target="_blank" 
                                       class="flex items-center justify-center gap-2 bg-dark py-4 rounded-2xl btn-action shadow-lg">
                                        <i class="fa-brands fa-whatsapp text-white"></i>
                                        <span class="text-[9px] font-black uppercase tracking-widest text-white">Chat Echi</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            setTimeout(() => {
                unitData[fase].forEach((u, i) => {
                    const uid = `u-${fase}-${i}`;
                    const swiper = new Swiper(`#swiper-${uid}`, {
                        slidesPerView: "auto",
                        spaceBetween: 12,
                        slidesOffsetBefore: 30,
                        slidesOffsetAfter: 30,
                        freeMode: true,
                    });
                    activeSwipers.push(swiper);
                });
            }, 100);
        }

        // Fungsi Preview - Tanpa Crop
        function previewImage(uid, newSrc, el) {
            const hero = document.getElementById(`hero-img-${uid}`);
            const container = document.getElementById(`hero-container-${uid}`);
            
            // Highlight thumbnail
            const slides = el.parentElement.querySelectorAll('.swiper-slide');
            slides.forEach(s => s.classList.remove('active-thumb'));
            el.classList.add('active-thumb');

            // Change hero dengan mode contain (Full View)
            hero.style.opacity = '0';
            setTimeout(() => {
                container.classList.add('is-preview');
                hero.src = newSrc;
                hero.style.opacity = '1';
            }, 200);
        }

        // Reset ke Mode Utama (Crop/Cover)
        function resetHero(uid, originSrc) {
            const hero = document.getElementById(`hero-img-${uid}`);
            const container = document.getElementById(`hero-container-${uid}`);
            const swiperContainer = document.getElementById(`swiper-${uid}`);
            
            if(!container.classList.contains('is-preview')) return;

            hero.style.opacity = '0';
            setTimeout(() => {
                container.classList.remove('is-preview');
                hero.src = originSrc;
                hero.style.opacity = '1';
                
                // Hapus highlight thumbnail
                swiperContainer.querySelectorAll('.swiper-slide').forEach(s => s.classList.remove('active-thumb'));
            }, 200);
        }

        function formatRibuan(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        
        function formatAndCalc(el) {
            let v = el.value.replace(/\D/g, "");
            document.getElementById('kpr-raw').value = v;
            el.value = formatRibuan(v);
            calc();
        }

        function calc() {
            const h = parseFloat(document.getElementById('kpr-raw').value) || 0;
            const dp = parseFloat(document.getElementById('dp-val').value) || 0;
            const t = parseFloat(document.getElementById('tenor-val').value) || 1;
            const pinjam = h - (h * dp / 100);
            const bunga = 0.05 / 12; 
            const bulan = t * 12;
            const cicilan = (pinjam * bunga) / (1 - Math.pow(1 + bunga, -bulan));
            
            document.getElementById('hasil-cicilan').innerText = "Rp " + formatRibuan(Math.round(cicilan || 0));
            document.getElementById('wa-link').href = `https://wa.me/${WA_NUMBER}?text=Halo%20Echi,%20ingin%20konsultasi%20unit%20harga%20Rp%20${formatRibuan(h)}`;
        }

        function setKPR(v, name) {
            document.getElementById('kpr-raw').value = v;
            document.getElementById('kpr-disp').value = formatRibuan(v);
            calc();
            document.getElementById('kpr').scrollIntoView({ behavior: 'smooth' });
        }

        window.onload = () => { renderUnits(7); calc(); };
    </script>
</body>
</html>

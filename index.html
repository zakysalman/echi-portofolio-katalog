<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nefsi Asrifah | Echi - Property Consultant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        :root {
            --gold: #a68966;
            --dark: #2d241d;
            --cream: #fdfbf7;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--cream); 
            color: var(--dark); 
            margin: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .nav-glass { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(10px); 
            z-index: 1000; 
            border-bottom: 1px solid #f0f0f0;
        }

        /* --- PROFILE DRAG & TRANSFORM --- */
        #profile-trigger {
            touch-action: pan-y;
            cursor: grab;
            position: relative;
            z-index: 10;
        }

        .profile-container {
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding-top: 100px;
            padding-bottom: 30px;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .profile-image-wrapper {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            margin-bottom: 20px;
            flex-shrink: 0;
            background: #eee;
        }

        .is-transformed .profile-container {
            flex-direction: row;
            align-items: center;
            text-align: left;
            padding-left: 20px;
            padding-right: 20px;
        }

        .is-transformed .profile-image-wrapper {
            width: 140px;
            height: 140px;
            border-radius: 20px;
            margin-bottom: 0;
            margin-right: 20px;
        }

        /* --- UNIT CARD DESIGN UPDATED --- */
        .unit-card {
            background: white; 
            border-radius: 2.5rem; 
            overflow: hidden;
            border: 1px solid #f0ebe3; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.04);
            margin-bottom: 3rem;
        }

        /* Atas Putih Polos */
        .card-top {
            background: #ffffff;
            padding: 0;
        }

        /* Bawah Coklat Cream */
        .card-bottom {
            background: var(--cream);
            padding: 1.5rem;
            border-top: 1px solid #f0ebe3;
        }

        .hero-view {
            width: 100%; 
            aspect-ratio: 1/1; 
            background: #ffffff; /* Putih Polos */
            overflow: hidden; 
            position: relative; 
            display: flex;
            align-items: center; 
            justify-content: center;
            transition: aspect-ratio 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hero-view.is-wide {
            aspect-ratio: 16/9;
        }

        .hero-view img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: opacity 0.3s ease;
        }

        .thumb-img-wrapper {
            width: 100%; aspect-ratio: 16/9; overflow: hidden;
            border-radius: 12px; cursor: pointer;
            background: #ffffff;
            border: 1px solid #eee;
        }
        .thumb-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .btn-chat-wa {
            background-color: var(--dark) !important;
            color: #ffffff !important;
            display: flex; align-items: center; justify-content: center;
            gap: 8px; padding: 1rem; border-radius: 1.2rem;
            text-align: center; font-weight: 800; font-size: 11px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(45, 36, 29, 0.2);
        }

        .phase-btn {
            padding: 10px 20px; border-radius: 12px; font-size: 11px;
            font-weight: 800; border: 1px solid #eee; background: white;
            white-space: nowrap; transition: 0.3s; color: var(--dark);
        }
        .phase-btn.active { background: var(--dark); color: white !important; }

        .swiper-slide { width: 180px !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .tab-btn {
            padding: 8px 15px; background: white; border-radius: 50px; font-size: 9px;
            font-weight: 800; text-transform: uppercase; border: 1px solid #eee;
            display: flex; align-items: center; gap: 5px; color: var(--dark) !important;
        }

        .kpr-result-box {
            background-color: var(--dark) !important;
            padding: 2.5rem; border-radius: 2rem; text-align: center;
        }
        .kpr-result-value { color: #ffffff !important; font-size: 1.8rem; font-weight: 900; margin-bottom: 2rem; display: block; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full nav-glass px-6 py-4 flex justify-between items-center">
        <div class="font-extrabold text-sm tracking-tighter uppercase">NEFSI ASRIFAH <span class="text-[#a68966]">| ECHI</span></div>
        <button onclick="toggleMenu(true)" class="p-1"><i class="fa-solid fa-bars text-xl"></i></button>
    </nav>

    <div id="mobile-menu" class="hidden fixed inset-0 bg-white z-[2000] flex-col items-center justify-center">
        <button onclick="toggleMenu(false)" class="absolute top-8 right-8 text-2xl"><i class="fa-solid fa-xmark"></i></button>
        <a href="#top" onclick="toggleMenu(false)" class="text-xl font-black mb-6 uppercase">Beranda</a>
        <a href="#katalog" onclick="toggleMenu(false)" class="text-xl font-black mb-6 uppercase">Katalog Unit</a>
        <a href="#kpr" onclick="toggleMenu(false)" class="text-xl font-black mb-6 uppercase">Simulasi KPR</a>
    </div>

    <!-- Profil Section -->
    <header id="top">
        <div id="profile-trigger" class="profile-container">
            <div class="profile-image-wrapper">
                <img src="wajah.jpg" class="w-full h-full object-cover" id="img-wajah" onerror="this.src='https://placehold.co/400x400?text=Echi'">
            </div>
            <div class="profile-text-content">
                <span class="text-[8px] font-bold text-[#a68966] uppercase tracking-[0.3em] mb-1 block">Property Consultant</span>
                <h1 class="text-2xl font-black tracking-tighter mb-1 uppercase">Estate by Echi</h1>
                <p class="text-gray-400 text-[9px] max-w-[250px] leading-tight font-medium">Spesialis Properti Park Serpong.</p>
                <div class="flex gap-2 mt-4 justify-center">
                    <a href="#katalog" class="tab-btn"><i class="fa-solid fa-house"></i> UNIT</a>
                    <a href="#kpr" class="tab-btn"><i class="fa-solid fa-calculator"></i> KPR</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Katalog -->
    <section id="katalog" class="py-10 px-4">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-center font-black uppercase tracking-[0.3em] text-[12px] mb-8">Pilihan Unit</h2>
            <div class="flex gap-2 overflow-x-auto no-scrollbar mb-8 pb-2 justify-center">
                <button onclick="renderUnits(7)" id="btn-7" class="phase-btn active">FASE 07</button>
                <button onclick="renderUnits(6)" id="btn-6" class="phase-btn">FASE 06</button>
                <button onclick="renderUnits(5)" id="btn-5" class="phase-btn">FASE 05</button>
            </div>
            <div id="unit-list"></div>
        </div>
    </section>

    <!-- KPR -->
    <section id="kpr" class="py-16 px-4 bg-white border-t">
        <div class="max-w-md mx-auto">
            <h3 class="text-center font-black uppercase text-[#a68966] mb-10">Simulasi Cicilan</h3>
            <div class="space-y-4">
                <div class="bg-[#fdfbf7] p-6 rounded-2xl border">
                    <label class="text-[8px] font-bold text-gray-400 uppercase block mb-2">Harga Unit</label>
                    <div class="flex items-center">
                        <span class="text-gray-400 font-bold mr-2">Rp</span>
                        <input type="text" id="kpr-disp" value="325.000.000" oninput="formatAndCalc(this)" class="w-full bg-transparent border-none outline-none text-2xl font-black tracking-tighter">
                    </div>
                    <input type="hidden" id="kpr-raw" value="325000000">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-[#fdfbf7] p-4 rounded-2xl border">
                        <label class="text-[8px] font-bold text-gray-400 uppercase block mb-1">DP (%)</label>
                        <input type="number" id="dp-val" value="5" oninput="calc()" class="w-full bg-transparent border-none font-bold text-lg outline-none">
                    </div>
                    <div class="bg-[#fdfbf7] p-4 rounded-2xl border">
                        <label class="text-[8px] font-bold text-gray-400 uppercase block mb-1">Tenor (Thn)</label>
                        <input type="number" id="tenor-val" value="20" oninput="calc()" class="w-full bg-transparent border-none font-bold text-lg outline-none">
                    </div>
                </div>
                <div class="mt-8 kpr-result-box">
                    <p class="text-[9px] font-bold text-gray-400 uppercase mb-3">Estimasi Cicilan</p>
                    <span id="hasil-cicilan" class="kpr-result-value">Rp 2.050.000</span>
                    <a href="https://wa.me/628111982833" target="_blank" class="block w-full py-4 bg-[#a68966] text-white rounded-xl font-bold text-[10px] uppercase">Tanya Echi Sekarang</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-12 text-center text-[8px] font-bold text-gray-300 uppercase tracking-widest">
        &copy; 2024 NEFSI ASRIFAH | ECHI PROPERTY
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const trigger = document.getElementById('profile-trigger');
        const header = document.querySelector('header');
        let isDragging = false, startY = 0;

        const handleStart = (e) => {
            isDragging = true;
            startY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        };
        const handleMove = (e) => {
            if (!isDragging) return;
            const currentY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            if (currentY - startY > 40) header.classList.add('is-transformed');
            else if (currentY - startY < -20) header.classList.remove('is-transformed');
        };
        const handleEnd = () => { isDragging = false; };

        trigger.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        trigger.addEventListener('touchstart', handleStart, { passive: true });
        window.addEventListener('touchmove', handleMove, { passive: true });
        window.addEventListener('touchend', handleEnd);

        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) header.classList.add('is-transformed');
            else if (!isDragging) header.classList.remove('is-transformed');
        });

        const WA_NUMBER = "628111982833";
        const unitData = {
            5: [
                { name: "Perunggu Livin Tipe B", tag: "305 Jt", val: 305000000, photos: ["fase-5/unit-1.jpg", "fase-5/unit-1.1.jpg", "fase-5/unit-1.2.jpg", "fase-5/unit-1.3.jpg"] },
                { name: "Perunggu Livin Tipe BB", tag: "390 Jt", val: 390000000, photos: ["fase-5/unit-2.jpg", "fase-5/unit-2.1.jpg", "fase-5/unit-2.2.jpg", "fase-5/unit-2.3.jpg"] },
                { name: "Quartz Livin Tipe Q", tag: "450 Jt", val: 450000000, photos: ["fase-5/unit-3.jpg", "fase-5/unit-3.1.jpg", "fase-5/unit-3.2.jpg", "fase-5/unit-3.3.jpg"] },
                { name: "TreeTops Livin Tipe", tag: "520 Jt", val: 520000000, photos: ["fase-5/unit-4.jpg", "fase-5/unit-4.1.jpg", "fase-5/unit-4.2.jpg", "fase-5/unit-4.3.jpg", "fase-5/unit-4.4.jpg"] },
                { name: "Gold Livin Tipe G", tag: "580 Jt", val: 580000000, photos: ["fase-5/unit-5.jpg", "fase-5/unit-5.1.jpg", "fase-5/unit-5.2.jpg", "fase-5/unit-5.3.jpg"] },
                { name: "GoldTops Livin Type GT", tag: "650 Jt", val: 650000000, photos: ["fase-5/unit-6.jpg", "fase-5/unit-6.1.jpg", "fase-5/unit-6.2.jpg", "fase-5/unit-6.3.jpg"] }
            ],
            6: [
                { name: "Perunggu Livin Tipe B", tag: "315 Jt", val: 315000000, photos: ["fase-6/unit-1.jpg", "fase-6/unit-1.1.jpg", "fase-6/unit-1.2.jpg", "fase-6/unit-1.3.jpg"] },
                { name: "Quartz Livin Tipe Q", tag: "460 Jt", val: 460000000, photos: ["fase-6/unit-2.jpg", "fase-6/unit-2.1.jpg", "fase-6/unit-2.2.jpg", "fase-6/unit-2.3.jpg"] },
                { name: "TreeTops Livin", tag: "530 Jt", val: 530000000, photos: ["fase-6/unit-3.jpg", "fase-6/unit-3.1.jpg", "fase-6/unit-3.2.jpg", "fase-6/unit-3.3.jpg"] },
                { name: "Gold Livin Tipe G", tag: "595 Jt", val: 595000000, photos: ["fase-6/unit-4.jpg", "fase-6/unit-4.1.jpg", "fase-6/unit-4.2.jpg", "fase-6/unit-4.3.jpg"] },
                { name: "GoldTops Livin Type GT", tag: "670 Jt", val: 670000000, photos: ["fase-6/unit-5.jpg", "fase-6/unit-5.1.jpg", "fase-6/unit-5.2.jpg", "fase-6/unit-5.3.jpg", "fase-6/unit-5.4.jpg"] }
            ],
            7: [
                { name: "Perunggu Beverly Livin", tag: "325 Jt", val: 325000000, photos: ["fase-7/unit-1.jpg", "fase-7/unit-1.1.jpg", "fase-7/unit-1.2.jpg", "fase-7/unit-1.3.jpg"] },
                { name: "Silver Beverly Livin", tag: "410 Jt", val: 410000000, photos: ["fase-7/unit-2.jpg", "fase-7/unit-2.1.jpg", "fase-7/unit-2.2.jpg", "fase-7/unit-2.3.jpg"] },
                { name: "Urban Beverly Livin", tag: "500 Jt", val: 500000000, photos: ["fase-7/unit-3.jpg", "fase-7/unit-3.1.jpg", "fase-7/unit-3.2.jpg", "fase-7/unit-3.3.jpg"] },
                { name: "TreeTops Beverly Livin", tag: "550 Jt", val: 550000000, photos: ["fase-7/unit-4.jpg", "fase-7/unit-4.1.jpg", "fase-7/unit-4.2.jpg", "fase-7/unit-4.3.jpg"] },
                { name: "Gold Beverly Livin", tag: "610 Jt", val: 610000000, photos: ["fase-7/unit-5.jpg", "fase-7/unit-5.1.jpg", "fase-7/unit-5.2.jpg", "fase-7/unit-5.3.jpg"] },
                { name: "GoldTops Beverly Livin", tag: "690 Jt", val: 690000000, photos: ["fase-7/unit-6.jpg", "fase-7/unit-6.1.jpg", "fase-7/unit-6.2.jpg", "fase-7/unit-6.3.jpg"] }
            ]
        };

        let activeSwipers = [];

        function renderUnits(fase) {
            const list = document.getElementById('unit-list');
            list.innerHTML = '';
            activeSwipers.forEach(s => s.destroy());
            activeSwipers = [];

            document.querySelectorAll('.phase-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${fase}`));

            unitData[fase].forEach((u, i) => {
                const uid = `u-${fase}-${i}`;
                const heroSrc = u.photos[0];
                const thumbHtml = u.photos.slice(1).map(p => `
                    <div class="swiper-slide" onclick="previewImage('${uid}', '${p}')">
                        <div class="thumb-img-wrapper">
                            <img src="${p}" onerror="this.src='https://placehold.co/600x337?text=Detail'">
                        </div>
                    </div>
                `).join('');

                list.innerHTML += `
                    <div class="unit-card">
                        <!-- BAGIAN ATAS: PUTIH POLOS -->
                        <div class="card-top">
                            <div class="hero-view" id="hero-container-${uid}" onclick="resetHero('${uid}', '${heroSrc}')">
                                <img id="hero-img-${uid}" src="${heroSrc}" onerror="this.src='https://placehold.co/600x600?text=${u.name}'">
                            </div>
                        </div>
                        
                        <!-- BAGIAN BAWAH: COKLAT CREAM -->
                        <div class="card-bottom">
                            <h4 class="font-black text-2xl uppercase tracking-tighter mb-4">${u.name}</h4>
                            <div class="mb-6">
                                <p class="text-[7px] font-black text-gray-400 uppercase tracking-widest mb-3">Galeri Detail</p>
                                <div class="swiper" id="swiper-${uid}">
                                    <div class="swiper-wrapper">${thumbHtml}</div>
                                </div>
                            </div>

                            <div class="flex flex-col gap-3">
                                <div class="bg-white p-5 rounded-2xl border border-[#f0ebe3] flex justify-between items-center shadow-sm">
                                    <div>
                                        <p class="text-[7px] font-bold text-gray-400 uppercase">Harga Mulai</p>
                                        <p class="font-black text-xl text-[#a68966]">Rp ${u.tag}</p>
                                    </div>
                                    <button onclick="setKPR(${u.val})" class="bg-transparent border border-[#a68966] text-[#a68966] px-4 py-2 rounded-xl text-[8px] font-black uppercase">Simulasi</button>
                                </div>
                                <a href="https://wa.me/${WA_NUMBER}?text=Halo%20Echi,%20info%20unit%20${u.name}" target="_blank" class="btn-chat-wa">
                                    <i class="fa-brands fa-whatsapp"></i><span>Chat Echi Sekarang</span>
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            });

            setTimeout(() => { 
                unitData[fase].forEach((u, i) => {
                    activeSwipers.push(new Swiper(`#swiper-u-${fase}-${i}`, { 
                        slidesPerView: "auto", spaceBetween: 12, loop: false
                    }));
                }); 
            }, 100);
        }

        function previewImage(id, src) { 
            const container = document.getElementById(`hero-container-${id}`);
            const img = document.getElementById(`hero-img-${id}`);
            container.classList.add('is-wide');
            img.style.opacity = '0';
            setTimeout(() => { img.src = src; img.style.opacity = '1'; }, 150);
        }

        function resetHero(id, src) { 
            const container = document.getElementById(`hero-container-${id}`);
            const img = document.getElementById(`hero-img-${id}`);
            container.classList.remove('is-wide');
            img.style.opacity = '0';
            setTimeout(() => { img.src = src; img.style.opacity = '1'; }, 150);
        }

        function toggleMenu(s) { document.getElementById('mobile-menu').classList.toggle('hidden', !s); document.getElementById('mobile-menu').classList.toggle('flex', s); }
        function formatRibuan(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function formatAndCalc(el) { let v = el.value.replace(/\D/g, ""); document.getElementById('kpr-raw').value = v; el.value = formatRibuan(v); calc(); }
        function calc() {
            const h = parseFloat(document.getElementById('kpr-raw').value) || 0, dp = parseFloat(document.getElementById('dp-val').value) || 0, t = parseFloat(document.getElementById('tenor-val').value) || 1;
            const p = h - (h * dp / 100), b = 0.05 / 12, m = t * 12;
            const c = (p * b) / (1 - Math.pow(1 + b, -m));
            document.getElementById('hasil-cicilan').innerText = "Rp " + formatRibuan(Math.round(c || 0));
        }
        function setKPR(v) { document.getElementById('kpr-raw').value = v; document.getElementById('kpr-disp').value = formatRibuan(v); calc(); document.getElementById('kpr').scrollIntoView({ behavior: 'smooth' }); }

        window.onload = () => { renderUnits(7); calc(); };
    </script>
</body>
</html>

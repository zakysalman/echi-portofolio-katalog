<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nefsi Asrifah | Echi - Property Consultant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        :root {
            --gold: #a68966;
            --dark: #2d241d;
            --cream-light: #fdfcf9;
            --champagne: #f0ebe3;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8f5f0; 
            color: var(--dark); 
            margin: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .nav-glass { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(10px); 
            z-index: 1000; 
            border-bottom: 1px solid #f0f0f0;
        }

        /* --- SOSMED STYLE --- */
        .sosmed-nav { display: flex; gap: 12px; align-items: center; margin-right: 15px; }
        .sosmed-nav a { color: var(--dark); font-size: 14px; transition: 0.3s; }
        .sosmed-profile { display: flex; gap: 15px; margin-top: 15px; }
        .sosmed-profile a { 
            width: 32px; height: 32px; border-radius: 50%; background: white; 
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            color: var(--dark); transition: 0.3s;
        }

        /* --- PROFILE ANIMATION --- */
        .profile-container {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; text-align: center;
            padding-top: 100px; padding-bottom: 30px; width: 100%; max-width: 1000px; margin: 0 auto;
        }
        .profile-image-wrapper {
            width: 120px; height: 120px; border-radius: 50%; overflow: hidden; border: 4px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: all 0.5s ease; margin-bottom: 15px;
            position: relative;
        }
        
        .scroll-indicator { font-size: 12px; color: var(--gold); margin-bottom: 15px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(5px);} 60% {transform: translateY(3px);} }

        .quick-tabs { display: flex; gap: 8px; justify-content: center; margin-top: 15px; }
        .tab-btn { 
            padding: 8px 18px; background: white; border-radius: 50px; font-size: 9px; 
            font-weight: 800; border: 1px solid #eee; display: flex; align-items: center; gap: 6px;
            text-transform: uppercase; letter-spacing: 0.1em;
        }

        .is-transformed .profile-container { flex-direction: row; text-align: left; padding: 110px 40px 30px; }
        .is-transformed .profile-image-wrapper { width: 110px; height: 110px; border-radius: 25px; margin-bottom: 0; margin-right: 25px; }
        .is-transformed .scroll-indicator { display: none; }
        .is-transformed .quick-tabs, .is-transformed .sosmed-profile { justify-content: flex-start; }

        /* --- ZOOM & DESKTOP GRID LOGIC --- */
        #unit-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            #unit-list {
                grid-template-columns: repeat(2, 1fr);
                gap: 30px;
            }
            .profile-container { padding-top: 140px; }
            .is-transformed .profile-container { padding: 120px 60px 40px; }
        }

        .hero-view { width: 100%; aspect-ratio: 1/1; background: #f9f7f4; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; transition: all 0.4s ease; }
        .hero-view.is-preview { aspect-ratio: 16/9; background: #1a1a1a; pointer-events: auto; }
        .hero-view img { width: 100%; height: 100%; object-fit: cover; transform: scale(1.1); transition: transform 0.4s ease; }
        .hero-view.is-preview img { transform: scale(1); }
        
        .static-photo-wrapper { width: 100px; aspect-ratio: 1/1; overflow: hidden; flex-shrink: 0; }
        .static-photo-wrapper img { width: 100%; height: 100%; object-fit: cover; transform: scale(1.15); }
        .blend-multiply { mix-blend-mode: multiply; }

        .btn-back-main {
            position: absolute; bottom: 15px; background: rgba(255,255,255,0.95);
            padding: 10px 20px; border-radius: 50px; font-size: 8px; font-weight: 900;
            display: none; z-index: 20; border: 1px solid var(--gold);
        }
        .is-preview .btn-back-main { display: block; }

        .unit-card { background: var(--cream-light); border-radius: 2rem; overflow: hidden; border: 1px solid var(--champagne); display: flex; flex-direction: column; }
        .swiper-container-custom { width: 100%; aspect-ratio: 16/9; border-radius: 1.2rem; overflow: hidden; }
        .phase-btn { padding: 10px 20px; border-radius: 12px; font-size: 11px; font-weight: 800; border: 1px solid #eee; background: white; transition: 0.3s; }
        .phase-btn.active { background: var(--dark); color: white !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full nav-glass px-6 py-4 flex justify-between items-center">
        <div class="font-extrabold text-sm tracking-tighter uppercase">NEFSI ASRIFAH <span class="text-[#a68966]">| ECHI</span></div>
        <div class="flex items-center">
            <div class="sosmed-nav">
                <a href="https://www.instagram.com/lippokarawaci.id?igsh=MXcwcTduOWV5ZXhqdA==" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@parkserponghomes?_r=1&_t=ZS-94uDfA8olij" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
                <a href="https://wa.me/6281119001899" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
            </div>
            <button onclick="toggleMenu(true)" class="p-1"><i class="fa-solid fa-bars text-xl"></i></button>
        </div>
    </nav>

    <div id="mobile-menu" class="hidden fixed inset-0 bg-white z-[2000] flex-col items-center justify-center text-center">
        <button onclick="toggleMenu(false)" class="absolute top-8 right-8 text-2xl"><i class="fa-solid fa-xmark"></i></button>
        <a href="#top" onclick="toggleMenu(false)" class="text-xl font-black mb-6 uppercase">Beranda</a>
        <a href="#katalog" onclick="toggleMenu(false)" class="text-xl font-black mb-6 uppercase">Katalog Unit</a>
        <a href="#kpr" onclick="toggleMenu(false)" class="text-xl font-black mb-6 uppercase">Simulasi KPR</a>
    </div>

    <header id="top" class="w-full">
        <div class="profile-container">
            <div class="profile-image-wrapper">
                <img src="wajah.jpg" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400?text=Echi'">
            </div>
            <div class="scroll-indicator"><i class="fa-solid fa-chevron-down"></i></div>

            <div class="profile-text-content">
                <span class="text-[8px] font-bold text-[#a68966] uppercase tracking-[0.3em] mb-1 block">Property Consultant</span>
                <h1 class="text-3xl md:text-4xl font-black tracking-tighter mb-1 uppercase">Estate by Echi</h1>
                <p class="text-gray-400 text-[10px] md:text-xs max-w-[300px] leading-tight font-medium">Membantu Anda menemukan hunian impian di Park Serpong.</p>
                
                <div class="sosmed-profile">
                    <a href="https://www.instagram.com/lippokarawaci.id?igsh=MXcwcTduOWV5ZXhqdA==" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                    <a href="https://www.tiktok.com/@parkserponghomes?_r=1&_t=ZS-94uDfA8olij" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
                    <a href="https://wa.me/6281119001899" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
                </div>

                <div class="quick-tabs">
                    <a href="#katalog" class="tab-btn"><i class="fa-solid fa-house"></i> Unit</a>
                    <a href="#kpr" class="tab-btn"><i class="fa-solid fa-calculator"></i> KPR</a>
                </div>
            </div>
        </div>
    </header>

    <section id="katalog" class="py-10 px-6">
        <div class="max-w-6xl mx-auto text-center">
            <h2 class="text-[12px] font-bold text-gray-400 uppercase tracking-[0.3em] mb-4">Unit Park Serpong</h2>
            <div class="flex gap-2 overflow-x-auto no-scrollbar mb-12 pb-2 justify-center">
                <button onclick="renderUnits(7)" id="btn-7" class="phase-btn active">FASE 07</button>
                <button onclick="renderUnits(6)" id="btn-6" class="phase-btn">FASE 06</button>
                <button onclick="renderUnits(5)" id="btn-5" class="phase-btn">FASE 05</button>
            </div>
            <div id="unit-list" class="text-left"></div>
        </div>
    </section>

    <section id="kpr" class="py-20 px-6 bg-white border-t">
        <div class="max-w-4xl mx-auto">
            <h3 class="text-center font-black uppercase text-[#a68966] mb-12 tracking-widest text-xs">Simulasi KPR</h3>
            <div class="grid md:grid-cols-2 gap-8 items-center">
                <div class="space-y-4">
                    <div class="bg-[#fdfcf9] p-6 rounded-2xl border border-[#f0ebe3]">
                        <label class="text-[8px] font-bold text-gray-400 uppercase block mb-2">Harga Unit</label>
                        <div class="flex items-center">
                            <span class="text-gray-400 font-bold mr-2">Rp</span>
                            <input type="text" id="kpr-disp" value="325.000.000" oninput="formatAndCalc(this)" class="w-full bg-transparent border-none outline-none text-2xl font-black tracking-tighter">
                        </div>
                        <input type="hidden" id="kpr-raw" value="325000000">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-[#fdfcf9] p-4 rounded-2xl border border-[#f0ebe3]">
                            <label class="text-[8px] font-bold text-gray-400 uppercase block mb-1">DP (%)</label>
                            <input type="number" id="dp-val" value="5" oninput="calc()" class="w-full bg-transparent border-none font-bold text-lg outline-none">
                        </div>
                        <div class="bg-[#fdfcf9] p-4 rounded-2xl border border-[#f0ebe3]">
                            <label class="text-[8px] font-bold text-gray-400 uppercase block mb-1">Tenor (Tahun)</label>
                            <input type="number" id="tenor-val" value="20" oninput="calc()" class="w-full bg-transparent border-none font-bold text-lg outline-none">
                        </div>
                    </div>
                </div>
                <div class="bg-[#2d241d] p-10 rounded-3xl text-center text-white">
                    <p class="text-[8px] font-bold text-gray-400 uppercase mb-2">Estimasi Cicilan</p>
                    <span id="hasil-cicilan" class="text-4xl font-black block mb-6">Rp 2.050.000</span>
                    <a href="https://wa.me/6281119001899" target="_blank" class="block py-4 bg-[#a68966] text-white rounded-xl font-bold text-[10px] uppercase tracking-widest hover:brightness-110 transition">Tanya Detail Unit</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-16 text-center text-[8px] font-bold text-gray-300 uppercase tracking-[0.4em]">
        &copy; 2024 NEFSI ASRIFAH | ECHI PROPERTY
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const WA_NUMBER = "6281119001899";

        window.addEventListener('scroll', () => {
            if (window.scrollY > 30) document.body.classList.add('is-transformed');
            else document.body.classList.remove('is-transformed');
        });

        const unitData = {
            7: [
                { name: "Perunggu Beverly Livin", tag: "325 Jt", val: 325000000, desc: "Gaya Beverly Hills di Serpong.", bed: 2, bath: 1, floor: 1, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Silver Beverly Livin", tag: "410 Jt", val: 410000000, desc: "Sentuhan mewah modern.", bed: 2, bath: 2, floor: 2, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { name: "Urban Beverly Livin", tag: "500 Jt", val: 500000000, desc: "Gaya hidup perkotaan dinamis.", bed: 3, bath: 2, floor: 2, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] },
                { name: "TreeTops Beverly Livin", tag: "550 Jt", val: 550000000, desc: "View terbaik dari lantai dua.", bed: 3, bath: 3, floor: 2, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg"] },
                { name: "Gold Beverly Livin", tag: "610 Jt", val: 610000000, desc: "Desain ikonik dan berkelas.", bed: 3, bath: 3, floor: 2, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg", "unit-5.3.jpg"] },
                { name: "GoldTops Beverly Livin", tag: "690 Jt", val: 690000000, desc: "Unit terbaik di kelasnya.", bed: 4, bath: 4, floor: 2, photos: ["unit-6.jpg", "unit-6.1.jpg", "unit-6.2.jpg", "unit-6.3.jpg"] }
            ],
            6: [
                { name: "Perunggu Livin Tipe B", tag: "315 Jt", val: 315000000, desc: "Modern compact living.", bed: 2, bath: 1, floor: 1, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Quartz Livin Tipe Q", tag: "460 Jt", val: 460000000, desc: "Desain elegan fungsional.", bed: 2, bath: 2, floor: 2, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { name: "TreeTops Livin", tag: "530 Jt", val: 530000000, desc: "Keseimbangan dengan alam.", bed: 3, bath: 2, floor: 2, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] },
                { name: "Gold Livin Tipe G", tag: "595 Jt", val: 595000000, desc: "Ruang tamu luas & lega.", bed: 3, bath: 3, floor: 2, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg"] },
                { name: "GoldTops Livin Type GT", tag: "670 Jt", val: 670000000, desc: "Simbol kemapanan keluarga.", bed: 4, bath: 4, floor: 2, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg", "unit-5.3.jpg"] }
            ],
            5: [
                { name: "Perunggu Livin Tipe B", tag: "305 Jt", val: 305000000, desc: "Hunian nyaman harga terjangkau.", bed: 2, bath: 1, floor: 1, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Perunggu Livin Tipe BB", tag: "390 Jt", val: 390000000, desc: "Tipe favorit keluarga muda.", bed: 2, bath: 2, floor: 1, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { name: "Quartz Livin Tipe Q", tag: "450 Jt", val: 450000000, desc: "Modern dan minimalis.", bed: 2, bath: 2, floor: 2, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] },
                { name: "TreeTops Livin Tipe", tag: "520 Jt", val: 520000000, desc: "Suasana asri nan hijau.", bed: 3, bath: 2, floor: 2, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg"] },
                { name: "Gold Livin Tipe G", tag: "580 Jt", val: 580000000, desc: "Kemewahan di setiap sudut.", bed: 3, bath: 3, floor: 2, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg", "unit-5.3.jpg"] },
                { name: "GoldTops Livin Type GT", tag: "650 Jt", val: 650000000, desc: "Eksklusivitas tanpa batas.", bed: 4, bath: 3, floor: 2, photos: ["unit-6.jpg", "unit-6.1.jpg", "unit-6.2.jpg", "unit-6.3.jpg"] }
            ]
        };

        function renderUnits(fase) {
            const list = document.getElementById('unit-list');
            list.innerHTML = '';
            document.querySelectorAll('.phase-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${fase}`));
            unitData[fase].forEach((u, i) => {
                const uid = `u-${fase}-${i}`;
                const mainImg = `fase-${fase}/` + u.photos[0];
                const slides = u.photos.slice(1).map(p => `<div class="swiper-slide" onclick="previewImage('${uid}', 'fase-${fase}/${p}')"><img src="fase-${fase}/${p}" class="w-full h-full object-cover"></div>`).join('');
                list.innerHTML += `
                    <div class="unit-card">
                        <div class="hero-view" id="cont-${uid}"><img id="img-${uid}" src="${mainImg}" class="blend-multiply"><button onclick="resetHero('${uid}', '${mainImg}')" class="btn-back-main">Reset</button></div>
                        <div class="py-6 flex items-center gap-4 px-6 border-b border-gray-50">
                            <div class="static-photo-wrapper"><img src="${mainImg}" class="blend-multiply"></div>
                            <div class="swiper swiper-container-custom" id="sw-${uid}"><div class="swiper-wrapper">${slides}</div></div>
                        </div>
                        <div class="px-8 py-8 flex-grow flex flex-col">
                            <h4 class="font-black text-xl md:text-2xl uppercase tracking-tighter mb-4 leading-tight">${u.name}</h4>
                            <div class="mb-4">
                                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-wider mb-0.5">Mulai Dari</p>
                                <p class="font-bold text-lg text-[#a68966]">Rp ${u.tag}</p>
                            </div>
                            <p class="text-[10px] text-gray-500 font-medium mb-6 leading-relaxed flex-grow">${u.desc}</p>
                            <div class="flex gap-4 mb-8 pb-6 border-b border-gray-100">
                                <div class="text-[9px] font-bold text-gray-400 flex items-center gap-1.5"><i class="fa-solid fa-bed text-[10px]"></i> ${u.bed} BR</div>
                                <div class="text-[9px] font-bold text-gray-400 flex items-center gap-1.5"><i class="fa-solid fa-bath text-[10px]"></i> ${u.bath} BA</div>
                                <div class="text-[9px] font-bold text-gray-400 flex items-center gap-1.5"><i class="fa-solid fa-stairs text-[10px]"></i> ${u.floor} LT</div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="setKPR(${u.val})" class="bg-white border py-4 rounded-2xl text-[9px] font-black uppercase hover:bg-gray-50 transition">Simulasi</button>
                                <a href="https://wa.me/${WA_NUMBER}?text=Halo Echi, saya tertarik unit ${u.name}" target="_blank" class="bg-[#2d241d] text-white flex items-center justify-center rounded-2xl text-[9px] font-black uppercase hover:opacity-90 transition">Chat Echi</a>
                            </div>
                        </div>
                    </div>
                `;
            });
            setTimeout(() => { unitData[fase].forEach((u, i) => { new Swiper(`#sw-u-${fase}-${i}`, { loop: true, autoplay: { delay: 3000, disableOnInteraction: false } }); }); }, 100);
        }

        function previewImage(id, src) { const cont = document.getElementById(`cont-${id}`); const img = document.getElementById(`img-${id}`); cont.classList.add('is-preview'); img.src = src; img.classList.remove('blend-multiply'); }
        function resetHero(id, src) { const cont = document.getElementById(`cont-${id}`); const img = document.getElementById(`img-${id}`); cont.classList.remove('is-preview'); img.src = src; img.classList.add('blend-multiply'); }
        function toggleMenu(s) { document.getElementById('mobile-menu').classList.toggle('hidden', !s); document.getElementById('mobile-menu').classList.toggle('flex', s); }
        function formatRibuan(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function formatAndCalc(el) { let v = el.value.replace(/\D/g, ""); document.getElementById('kpr-raw').value = v; el.value = formatRibuan(v); calc(); }
        function calc() {
            const h = parseFloat(document.getElementById('kpr-raw').value) || 0;
            const dp = parseFloat(document.getElementById('dp-val').value) || 5;
            const t = parseFloat(document.getElementById('tenor-val').value) || 20;
            const p = h - (h * dp / 100);
            const r = 0.05 / 12;
            const n = t * 12;
            const c = (p * r) / (1 - Math.pow(1 + r, -n));
            document.getElementById('hasil-cicilan').innerText = "Rp " + formatRibuan(Math.round(c || 0));
        }
        function setKPR(v) { document.getElementById('kpr-raw').value = v; document.getElementById('kpr-disp').value = formatRibuan(v); calc(); document.getElementById('kpr').scrollIntoView({ behavior: 'smooth' }); }
        window.onload = () => { renderUnits(7); calc(); };
    </script>
</body>
</html>

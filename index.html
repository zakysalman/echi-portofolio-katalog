<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nefsi Asrifah | Echi - Property Consultant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --gold: #a68966;
            --dark: #4a3728;
            --cream: #fdfbf7;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--cream); 
            color: var(--dark); 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .nav-glass { 
            background: rgba(253, 251, 247, 0.98); 
            backdrop-filter: blur(10px); 
            z-index: 1000; 
            border-bottom: 1px solid #eee;
        }

        /* Container Kartu agar tidak berantakan */
        .unit-card {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 1px solid #f0ebe3;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            height: 100%;
        }

        /* Area Gambar Utama */
        .main-img-area {
            width: 100%;
            aspect-ratio: 4/3;
            background: #f7f3ed;
            position: relative;
            overflow: hidden;
        }
        .main-img-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s;
        }

        /* List Thumbnail di bawah gambar utama */
        .thumb-list {
            display: flex;
            gap: 8px;
            padding: 10px;
            overflow-x: auto;
            background: #fff;
            border-bottom: 1px solid #f8f5f0;
        }
        .thumb-list::-webkit-scrollbar { display: none; }
        
        .thumb-box {
            min-width: 70px;
            height: 45px;
            border-radius: 8px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            background: #eee;
        }
        .thumb-box.active { border-color: var(--gold); }

        /* Menu Mobile */
        #mobile-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .phase-btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 800;
            transition: 0.3s;
            border: 1px solid #eee;
            background: white;
            white-space: nowrap;
        }
        .phase-btn.active {
            background: var(--dark);
            color: white;
            border-color: var(--dark);
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full nav-glass px-5 py-4 flex justify-between items-center">
        <div class="font-extrabold text-xs tracking-tighter uppercase">NEFSI ASRIFAH <span class="text-[#a68966]">| ECHI</span></div>
        <button onclick="document.getElementById('mobile-menu').style.display='flex'" class="p-2 bg-gray-50 rounded-lg"><i class="fa-solid fa-bars-staggered"></i></button>
    </nav>

    <div id="mobile-menu">
        <button onclick="document.getElementById('mobile-menu').style.display='none'" class="absolute top-5 right-5 text-2xl"><i class="fa-solid fa-xmark"></i></button>
        <a href="#top" onclick="document.getElementById('mobile-menu').style.display='none'" class="py-4 text-xl font-black uppercase">Beranda</a>
        <a href="#katalog" onclick="document.getElementById('mobile-menu').style.display='none'" class="py-4 text-xl font-black uppercase">Unit</a>
        <a href="#kpr" onclick="document.getElementById('mobile-menu').style.display='none'" class="py-4 text-xl font-black uppercase">KPR</a>
    </div>

    <div id="top" class="pt-24 pb-8 px-5">
        <div class="max-w-4xl mx-auto bg-white rounded-[2rem] p-6 flex flex-col md:flex-row items-center gap-6 shadow-sm">
            <div class="w-32 h-32 md:w-40 md:h-40 rounded-full overflow-hidden border-4 border-[#fdfbf7] shrink-0">
                <img src="wajah.jpg" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400?text=Echi'">
            </div>
            <div class="text-center md:text-left">
                <span class="text-[9px] font-black text-[#a68966] uppercase tracking-widest">Property Consultant</span>
                <h1 class="text-2xl font-black mb-2">Echi - Park Serpong</h1>
                <p class="text-gray-500 text-xs leading-relaxed">Membantu Anda mendapatkan hunian impian di lokasi strategis Park Serpong dengan cicilan ringan.</p>
            </div>
        </div>
    </div>

    <section id="katalog" class="py-6 px-5">
        <div class="max-w-6xl mx-auto">
            <div class="flex items-center gap-3 overflow-x-auto pb-6 no-scrollbar">
                <button onclick="renderUnits(7)" id="btn-7" class="phase-btn active">FASE 07</button>
                <button onclick="renderUnits(6)" id="btn-6" class="phase-btn">FASE 06</button>
                <button onclick="renderUnits(5)" id="btn-5" class="phase-btn">FASE 05</button>
            </div>
            
            <div id="unit-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Konten Otomatis -->
            </div>
        </div>
    </section>

    <section id="kpr" class="py-12 px-5 bg-white mt-10">
        <div class="max-w-md mx-auto">
            <h3 class="text-xl font-black text-center mb-8 uppercase tracking-widest text-[#a68966]">Simulasi KPR</h3>
            <div class="space-y-4">
                <div class="bg-[#fdfbf7] p-4 rounded-xl border border-gray-100">
                    <label class="text-[8px] font-black uppercase text-gray-400">Harga Unit (Rp)</label>
                    <input type="text" id="kpr-disp" value="325.000.000" oninput="updateHarga(this)" class="w-full bg-transparent border-none font-bold text-lg outline-none">
                    <input type="hidden" id="kpr-raw" value="325000000">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-[#fdfbf7] p-4 rounded-xl border border-gray-100">
                        <label class="text-[8px] font-black uppercase text-gray-400">DP (%)</label>
                        <input type="number" id="dp" value="5" oninput="hitung()" class="w-full bg-transparent border-none font-bold outline-none">
                    </div>
                    <div class="bg-[#fdfbf7] p-4 rounded-xl border border-gray-100">
                        <label class="text-[8px] font-black uppercase text-gray-400">Tenor (Thn)</label>
                        <input type="number" id="tenor" value="20" oninput="hitung()" class="w-full bg-transparent border-none font-bold outline-none">
                    </div>
                </div>
                <div class="bg-dark p-6 rounded-2xl text-center text-white shadow-xl">
                    <p class="text-[10px] font-bold opacity-50 uppercase tracking-widest mb-2">Cicilan Per Bulan</p>
                    <h2 id="hasil" class="text-2xl font-black text-[#a68966] mb-6">Rp 2.050.000</h2>
                    <a id="wa-btn" href="#" target="_blank" class="block w-full py-3 bg-[#a68966] rounded-lg font-black text-[10px] uppercase">Konsultasi Unit Ini</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-10 text-center text-[8px] font-bold text-gray-300 uppercase tracking-[0.3em]">
        &copy; 2024 Nefsi Asrifah | Echi Park Serpong
    </footer>

    <script>
        const unitData = {
            5: [
                { name: "Perunggu Livin Tipe B", tag: "305 Jt", val: 305000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Perunggu Livin Tipe BB", tag: "390 Jt", val: 390000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { name: "Quartz Livin Tipe Q", tag: "450 Jt", val: 450000000, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] },
                { name: "TreeTops Livin Tipe", tag: "520 Jt", val: 520000000, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg", "unit-4.4.jpg"] },
                { name: "Gold Livin Tipe G", tag: "580 Jt", val: 580000000, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg", "unit-5.3.jpg"] },
                { name: "GoldTops Livin Type GT", tag: "650 Jt", val: 650000000, photos: ["unit-6.jpg", "unit-6.1.jpg", "unit-6.2.jpg", "unit-6.3.jpg"] }
            ],
            6: [
                { name: "Perunggu Livin Tipe B", tag: "315 Jt", val: 315000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Quartz Livin Tipe Q", tag: "460 Jt", val: 460000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { name: "TreeTops Livin", tag: "530 Jt", val: 530000000, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] },
                { name: "Gold Livin Tipe G", tag: "595 Jt", val: 595000000, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg"] },
                { name: "GoldTops Livin Type GT", tag: "670 Jt", val: 670000000, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg", "unit-5.3.jpg", "unit-5.4.jpg"] }
            ],
            7: [
                { name: "Perunggu Beverly Livin", tag: "325 Jt", val: 325000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Silver Beverly Livin", tag: "410 Jt", val: 410000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { name: "Urban Beverly Livin", tag: "500 Jt", val: 500000000, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] },
                { name: "TreeTops Beverly Livin", tag: "550 Jt", val: 550000000, photos: ["unit-4.jpg", "unit-4.1.jpg", "unit-4.2.jpg", "unit-4.3.jpg"] },
                { name: "Gold Beverly Livin", tag: "610 Jt", val: 610000000, photos: ["unit-5.jpg", "unit-5.1.jpg", "unit-5.2.jpg", "unit-5.3.jpg"] },
                { name: "GoldTops Beverly Livin", tag: "690 Jt", val: 690000000, photos: ["unit-6.jpg", "unit-6.1.jpg", "unit-6.2.jpg", "unit-6.3.jpg"] }
            ]
        };

        function renderUnits(fase) {
            const grid = document.getElementById('unit-grid');
            grid.innerHTML = '';
            
            // Update Tombol Aktif
            document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+fase).classList.add('active');

            unitData[fase].forEach((u, i) => {
                const id = `u-${fase}-${i}`;
                const thumbs = u.photos.map((p, idx) => `
                    <img src="fase-${fase}/${p}" class="thumb-box ${idx===0?'active':''}" 
                         onclick="gantiFoto('${id}', 'fase-${fase}/${p}', this)"
                         onerror="this.src='https://placehold.co/100x70?text=Unit'">
                `).join('');

                grid.innerHTML += `
                    <div class="unit-card">
                        <div class="main-img-area">
                            <img id="img-${id}" src="fase-${fase}/${u.photos[0]}" onerror="this.src='https://placehold.co/600x450/f7f3ed/a68966?text=${u.name}'">
                        </div>
                        <div class="thumb-list">${thumbs}</div>
                        <div class="p-5">
                            <h4 class="font-black text-sm uppercase tracking-tight mb-4">${u.name}</h4>
                            <div class="flex justify-between items-center bg-[#fdfbf7] p-3 rounded-xl">
                                <div>
                                    <p class="text-[7px] font-black text-gray-400 uppercase">Harga</p>
                                    <p class="font-black text-[#a68966]">Rp ${u.tag}</p>
                                </div>
                                <button onclick="isiKPR(${u.val})" class="px-4 py-2 bg-dark text-white rounded-lg text-[9px] font-black uppercase">Hitung</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function gantiFoto(id, src, el) {
            document.getElementById('img-'+id).src = src;
            el.parentElement.querySelectorAll('img').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function formatRibuan(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        
        function updateHarga(el) {
            let v = el.value.replace(/\D/g, "");
            document.getElementById('kpr-raw').value = v;
            el.value = formatRibuan(v);
            hitung();
        }

        function hitung() {
            const h = parseFloat(document.getElementById('kpr-raw').value) || 0;
            const dp = parseFloat(document.getElementById('dp').value) || 0;
            const t = parseFloat(document.getElementById('tenor').value) || 1;
            const pinjam = h - (h * dp / 100);
            const bunga = 0.05 / 12; // Bunga 5% fixed asumsi
            const bulan = t * 12;
            const res = (pinjam * bunga) / (1 - Math.pow(1 + bunga, -bulan));
            
            document.getElementById('hasil').innerText = "Rp " + formatRibuan(Math.round(res || 0));
            document.getElementById('wa-btn').href = `https://wa.me/628111982833?text=Halo%20Echi,%20mau%20tanya%20unit%20harga%20Rp%20${formatRibuan(h)}`;
        }

        function isiKPR(v) {
            document.getElementById('kpr-raw').value = v;
            document.getElementById('kpr-disp').value = formatRibuan(v);
            hitung();
            document.getElementById('kpr').scrollIntoView({ behavior: 'smooth' });
        }

        // Jalankan saat pertama kali buka
        window.onload = () => { renderUnits(7); hitung(); };
    </script>
</body>
                </html>

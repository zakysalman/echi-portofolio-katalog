<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nefsi Asrifah | Echi - Property Consultant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --gold: #a68966;
            --dark: #4a3728;
            --cream: #fdfbf7;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--cream); 
            color: var(--dark); 
            margin: 0;
            scroll-behavior: smooth;
        }

        .nav-glass { background: rgba(253, 251, 247, 0.96); backdrop-filter: blur(10px); z-index: 1000; }
        
        .profile-wrapper {
            background: white;
            border-radius: 3rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        @media (min-width: 768px) {
            .profile-wrapper { flex-direction: row; min-height: 500px; }
            .profile-img-side { width: 40%; }
            .profile-info-side { width: 60%; padding: 4rem; }
        }

        /* KATALOG LAYOUT */
        .unit-card {
            background: white;
            border-radius: 2.5rem;
            padding: 1.2rem;
            border: 1px solid #f0f0f0;
            transition: all 0.3s ease;
        }

        .visual-layout {
            display: grid;
            grid-template-columns: 1fr 1.2fr; 
            gap: 12px;
            height: 420px;
            margin-bottom: 1.5rem;
        }

        .photo-box {
            background: #f0f0f0;
            border-radius: 1.5rem;
            overflow: hidden;
            position: relative;
            height: 100%;
        }

        .photo-main-right {
            background: transparent; /* Transparan sesuai garis putih */
            border-radius: 1.5rem;
            overflow: hidden;
            position: relative;
            height: 100%;
        }

        .unit-img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Menggunakan contain agar gambar tidak terpotong */
        }

        /* Slider Engine */
        .slider-container { width: 100%; height: 100%; position: relative; }
        .slider-wrapper { display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .slider-item { min-width: 100%; height: 100%; }

        .dot-nav {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
        }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(0,0,0,0.2); cursor: pointer; transition: all 0.3s ease; }
        .dot.active { background: var(--gold); width: 16px; border-radius: 4px; }

        /* Tombol Panah Slider (Garis Merah) */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.8);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }
        .nav-btn:hover { background: white; transform: translateY(-50%) scale(1.1); }
        .nav-prev { left: 8px; }
        .nav-next { right: 8px; }

        .price-tag {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--gold);
            letter-spacing: -1.5px;
        }

        @media (max-width: 640px) {
            .visual-layout { 
                height: auto; 
                grid-template-columns: 1fr; 
                display: flex;
                flex-direction: column;
            }
            .photo-main-right { 
                height: 300px; 
                order: 1;
                margin-bottom: 8px;
            }
            .photo-box { 
                height: 220px; 
                order: 2;
            }
            .price-tag { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <nav class="fixed w-full nav-glass px-8 py-5 border-b border-gray-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="font-extrabold text-xl tracking-tighter uppercase">NEFSI ASRIFAH <span class="text-[#a68966]">| ECHI</span></div>
            <a href="https://wa.me/628111982833" target="_blank" class="bg-[#4a3728] text-white px-5 py-2.5 rounded-full text-[10px] font-bold uppercase tracking-widest">WhatsApp</a>
        </div>
    </nav>

    <section id="home" class="pt-36 pb-16 px-6">
        <div class="max-w-6xl mx-auto">
            <div class="profile-wrapper" data-aos="fade-up">
                <div class="profile-img-side">
                    <img src="wajah.jpg" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=1976&auto=format&fit=crop'">
                </div>
                <div class="profile-info-side">
                    <span class="text-[10px] font-black text-[#a68966] uppercase tracking-[0.4em] mb-4 block">Official Sales Specialist</span>
                    <h1 class="text-4xl font-black text-[#4a3728] mb-4 tracking-tight">Halo, saya Echi</h1>
                    <p class="text-gray-500 font-medium leading-relaxed mb-8">Property Consultant resmi Park Serpong. Temukan pilihan hunian terbaik dengan simulasi cicilan transparan dan layanan responsif.</p>
                </div>
            </div>
        </div>
    </section>

    <section id="katalog" class="py-16 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-end mb-12">
                <div>
                    <h2 class="text-3xl font-black tracking-tighter uppercase mb-1">Park Serpong</h2>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest italic">Pilih Unit Impian Anda</p>
                </div>
                <select id="fase-selector" onchange="renderGrid(this.value)" class="bg-white border border-gray-200 px-4 py-2 rounded-xl text-[11px] font-bold outline-none cursor-pointer">
                    <option value="7">FASE 07</option>
                    <option value="6">FASE 06</option>
                    <option value="5">FASE 05</option>
                </select>
            </div>

            <div id="unit-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-8"></div>
        </div>
    </section>

    <section id="kpr" class="py-20 px-6 mb-20">
        <div class="max-w-4xl mx-auto bg-white p-12 rounded-[3rem] shadow-sm border border-gray-100">
            <h3 class="text-2xl font-black text-center mb-10 text-[#4a3728]">Simulasi Cicilan</h3>
            <div class="grid md:grid-cols-2 gap-12 items-center">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Harga Properti (Rp)</label>
                    <input type="text" id="kpr-disp" value="325.000.000" oninput="formatInput(this)" class="w-full text-3xl font-black outline-none border-b-2 border-gray-100 focus:border-[#a68966] bg-transparent pb-2 transition-all">
                    <input type="hidden" id="kpr-raw" value="325000000">
                </div>
                <div class="bg-gray-50 p-8 rounded-3xl text-center border border-gray-100">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">Estimasi Cicilan / Bulan</p>
                    <h4 id="kpr-res" class="text-3xl font-black text-[#a68966]">Rp 2.050.000</h4>
                </div>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const unitData = {
            5: [
                { name: "Perunggu Livin Tipe B", tag: "305 Jt", val: 305000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Perunggu Livin Tipe BB", tag: "390 Jt", val: 390000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] },
                { name: "Quartz Livin Tipe Q", tag: "450 Jt", val: 450000000, photos: ["unit-3.jpg", "unit-3.1.jpg", "unit-3.2.jpg", "unit-3.3.jpg"] }
            ],
            6: [
                { name: "Perunggu Livin Tipe B", tag: "315 Jt", val: 315000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] }
            ],
            7: [
                { name: "Perunggu Beverly Livin", tag: "325 Jt", val: 325000000, photos: ["unit-1.jpg", "unit-1.1.jpg", "unit-1.2.jpg", "unit-1.3.jpg"] },
                { name: "Silver Beverly Livin", tag: "410 Jt", val: 410000000, photos: ["unit-2.jpg", "unit-2.1.jpg", "unit-2.2.jpg", "unit-2.3.jpg"] }
            ]
        };

        let activeSliders = {};

        function renderGrid(phase) {
            const grid = document.getElementById('unit-grid');
            grid.innerHTML = '';
            unitData[phase].forEach((u, uIdx) => {
                const uniqueId = `u-${phase}-${uIdx}`;
                activeSliders[uniqueId] = 0;
                
                const mainPhoto = u.photos[0]; 
                const subPhotos = u.photos.slice(1); 

                const items = subPhotos.map(img => `
                    <div class="slider-item">
                        <img src="fase-${phase}/${img}" class="unit-img" onerror="this.src='https://placehold.co/400x600?text=Interior'">
                    </div>
                `).join('');
                
                const dots = subPhotos.map((_, i) => `
                    <div class="dot ${i === 0 ? 'active' : ''}" onclick="moveSlider('${uniqueId}', ${i})"></div>
                `).join('');

                grid.innerHTML += `
                    <div class="unit-card" data-aos="fade-up">
                        <div class="visual-layout">
                            <!-- Unit Utama (Transparan) -->
                            <div class="photo-main-right">
                                <img src="fase-${phase}/${mainPhoto}" class="unit-img" onerror="this.src='https://placehold.co/400x600?text=Exterior'">
                                <div class="absolute top-4 right-4 bg-black/20 backdrop-blur-md text-white text-[8px] px-3 py-1 rounded-full uppercase font-bold tracking-widest">Unit Utama</div>
                            </div>
                            <!-- Slider Pendukung dengan Tombol Panah -->
                            <div class="photo-box">
                                <div class="slider-container">
                                    <button class="nav-btn nav-prev" onclick="prevSlide('${uniqueId}', ${subPhotos.length})"><i class="fa-solid fa-chevron-left text-[10px]"></i></button>
                                    <div class="slider-wrapper" id="wrap-${uniqueId}">${items}</div>
                                    <button class="nav-btn nav-next" onclick="nextSlide('${uniqueId}', ${subPhotos.length})"><i class="fa-solid fa-chevron-right text-[10px]"></i></button>
                                    <div class="dot-nav" id="dots-${uniqueId}">${dots}</div>
                                </div>
                            </div>
                        </div>

                        <div class="px-2">
                            <h4 class="text-xl font-black text-[#4a3728] uppercase tracking-tighter mb-1">${u.name}</h4>
                            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-4">Official Portfolio</p>
                            <div class="flex justify-between items-center mb-4">
                                <div>
                                    <p class="text-[9px] font-bold text-gray-300 uppercase mb-1">Harga Mulai</p>
                                    <p class="price-tag">Rp ${u.tag}</p>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="setKPR(${u.val})" class="p-4 bg-gray-50 rounded-2xl border border-gray-100 hover:bg-white transition-all">
                                        <i class="fa-solid fa-calculator text-[#a68966]"></i>
                                    </button>
                                    <button onclick="window.open('https://wa.me/628111982833')" class="px-7 py-4 bg-[#a68966] text-white rounded-2xl font-bold text-[10px] uppercase tracking-widest shadow-lg shadow-[#a68966]/20">WhatsApp</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            AOS.refresh();
        }

        function moveSlider(id, idx) {
            activeSliders[id] = idx;
            const wrap = document.getElementById(`wrap-${id}`);
            const dots = document.getElementById(`dots-${id}`).querySelectorAll('.dot');
            wrap.style.transform = `translateX(-${idx * 100}%)`;
            dots.forEach(d => d.classList.remove('active'));
            dots[idx].classList.add('active');
        }

        function nextSlide(id, total) {
            let next = (activeSliders[id] + 1) % total;
            moveSlider(id, next);
        }

        function prevSlide(id, total) {
            let prev = (activeSliders[id] - 1 + total) % total;
            moveSlider(id, prev);
        }

        function formatIDR(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function formatInput(el) {
            let v = el.value.replace(/\D/g, "");
            document.getElementById('kpr-raw').value = v;
            el.value = formatIDR(v);
            calculateKPR();
        }
        function calculateKPR() {
            const h = parseFloat(document.getElementById('kpr-raw').value) || 0;
            const r = 0.05 / 12; const n = 20 * 12;
            const res = (h * 0.95 * r) / (1 - Math.pow(1 + r, -n));
            document.getElementById('kpr-res').innerText = "Rp " + formatIDR(Math.round(res));
        }
        function setKPR(v) {
            document.getElementById('kpr-raw').value = v;
            document.getElementById('kpr-disp').value = formatIDR(v);
            calculateKPR();
            document.getElementById('kpr').scrollIntoView({behavior: 'smooth'});
        }

        window.onload = () => { AOS.init({ duration: 800, once: true }); renderGrid(7); }
    </script>
</body>
                        </html>
